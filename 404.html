<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | Pizzaclap43</title>
    <link rel="icon" type="image/png" href="https://pizzaclap43.github.io/avatarHead.png">
    <link rel="stylesheet" href="https://pizzaclap43.github.io/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos específicos para que el error se vea centrado y pro */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .error-container {
            background: rgba(0, 0, 0, 0.85) !important;
            border: 3px solid #000;
            box-shadow: 8px 8px 0px #000;
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            color: #ffcc00;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        p {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .btn-home {
            display: inline-block;
            background-color: #ff9900;
            color: black !important;
            text-decoration: none;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            padding: 15px 20px;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            transition: 0.2s;
        }

        .btn-home:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000;
            background-color: #ffcc00;
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <div class="error-container">
        <h1>ERROR 404</h1>
        <p>¡Ups! Parece que esta página se perdió en el servidor.</p>
        <small style="color: #aaa; display: block; margin-bottom: 20px;">
            El archivo fue movido o no existe actualmente.
        </small>
        <a href="https://pizzaclap43.github.io" class="btn-home">
            <i class="fas fa-home"></i> VOLVER AL INICIO
        </a>
    </div>
</body>
</html>
