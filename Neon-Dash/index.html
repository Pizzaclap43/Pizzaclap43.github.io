<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0221">
    <title>Neon Dash - New Game</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0;
            background-color: #0d0221;
            color: #ff00ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.8s ease;
            touch-action: none;
        }

        .neon-title {
            font-size: 2.5rem;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            text-shadow: 2px 2px #ff00ff, -2px -2px #00ffff;
            margin-bottom: 15px;
            letter-spacing: 4px;
            text-align: center;
        }

        #start-menu, #game-over-menu, #settings-menu, #themes-menu {
            position: absolute;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(13, 2, 33, 0.95);
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        #game-over-menu, #settings-menu, #themes-menu { display: none; }

        #menu-icon-container {
            margin: 10px 0 25px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #menu-icon {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px #ff00ff);
        }

        .btn-neon {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #fff;
            background: transparent;
            border: 3px solid #ff00ff;
            cursor: pointer;
            box-shadow: 0 0 15px #ff00ff;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 15px;
            width: 250px;
        }

        .btn-neon:hover {
            background: #ff00ff;
            box-shadow: 0 0 30px #ff00ff;
        }

        .final-score {
            font-size: 1.8rem;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            margin: 10px 0;
        }

        .high-score {
            font-size: 1.2rem;
            color: #ffff00;
            text-shadow: 0 0 8px #ffff00;
            margin-bottom: 10px;
        }

        .setting-item { margin: 20px 0; width: 280px; text-align: center; }
        .setting-label { font-size: 1.2rem; color: #fff; display: block; margin-bottom: 10px; }
        input[type=range] { width: 100%; cursor: pointer; }

        #game-wrapper { display: none; flex-direction: column; align-items: center; }
        #game-container {
            position: relative;
            border: 4px solid #fff;
            box-shadow: 0 0 25px #ff00ff, inset 0 0 10px #ff00ff;
            background: #000;
            line-height: 0;
        }

        canvas { display: block; }
        .ui-panel {
            display: flex;
            justify-content: space-between;
            width: 360px;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        #lives { filter: drop-shadow(0 0 5px #ff0055); }
        #score-panel { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
    </style>
</head>
<body>

    <div id="start-menu">
        <h1 class="neon-title">NEON DASH</h1>
        <div id="menu-icon-container">
            <img src="favicon.png" alt="Icono" id="menu-icon">
        </div>
        <button class="btn-neon" onclick="startGame()">JUGAR</button>
        <button class="btn-neon" onclick="toggleMenu('themes-menu', true)" style="border-color: #7cfc00; box-shadow: 0 0 15px #7cfc00;">TEMAS</button>
        <button class="btn-neon" onclick="toggleMenu('settings-menu', true)" style="border-color: #00ffff; box-shadow: 0 0 15px #00ffff; font-size: 1.1rem;">AJUSTES</button>
    </div>

    <div id="themes-menu">
        <h1 class="neon-title">TEMAS</h1>
        <button class="btn-neon" onclick="setTheme('neon')" style="border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff;">NEON NIGHT</button>
        <button class="btn-neon" onclick="setTheme('frutiger')" style="border-color: #4facfe; box-shadow: 0 0 15px #4facfe;">FRUTIGER AERO</button>
        <button class="btn-neon" onclick="toggleMenu('themes-menu', false)" style="border-color: #ffff00; box-shadow: 0 0 15px #ffff00; margin-top: 30px;">VOLVER</button>
    </div>

    <div id="settings-menu">
        <h1 class="neon-title">AJUSTES</h1>
        <div class="setting-item">
            <span class="setting-label">VOLUMEN</span>
            <input type="range" id="volume-control" min="0" max="1" step="0.1" oninput="updateVolume(this.value)">
        </div>
        <div class="setting-item">
            <span class="setting-label">EFECTOS VISUALES</span>
            <button id="effects-toggle" class="btn-neon" onclick="toggleEffects()" style="font-size: 1rem; padding: 10px; width: 100%;">ACTIVADOS</button>
        </div>
        <button class="btn-neon" onclick="toggleMenu('settings-menu', false)" style="border-color: #ffff00; box-shadow: 0 0 15px #ffff00; font-size: 1.1rem;">VOLVER</button>
    </div>

    <div id="game-over-menu">
        <h1 class="neon-title" style="text-shadow: 2px 2px #ff0000, -2px -2px #ff00ff;">¡FIN DEL JUEGO!</h1>
        <p class="final-score">PUNTOS: <span id="final-score-val">0</span></p>
        <p class="high-score">RÉCORD: <span id="high-score-val">0</span></p>
        <button class="btn-neon" onclick="location.reload()" style="border-color: #00ffff; box-shadow: 0 0 15px #00ffff;">REINTENTAR</button>
    </div>

    <div id="game-wrapper">
        <h1 class="neon-title" id="game-title">NEON DASH</h1>
        <div id="game-container">
            <canvas id="gameCanvas" width="360" height="500"></canvas>
        </div>
        <div class="ui-panel" id="ui-panel">
            <div id="lives">❤️❤️❤️</div>
            <div id="score-panel">PUNTOS: <span id="score-val">0</span></div>
        </div>
    </div>

    <script>
        const volumeSlider = document.getElementById("volume-control");
        const effectsBtn = document.getElementById("effects-toggle");
        
        // --- SISTEMA DE TEMAS ---
        const themes = {
            neon: {
                bg: "#0d0221",
                player: "#ff00ff",
                enemy: "#00ffff",
                point: "#ffff00",
                shadow: "#ff00ff",
                title: "NEON DASH"
            },
            frutiger: {
                bg: "#4facfe",
                player: "#7cfc00",
                enemy: "#ffffff",
                point: "#00eeff",
                shadow: "#ffffff",
                title: "AERO DASH"
            }
        };

        let currentThemeKey = localStorage.getItem("neonDashTheme") || "neon";
        
        // --- CARGA DE DATOS INMEDIATA ---
        let savedVolume = localStorage.getItem("neonDashVolume");
        let initialVol = savedVolume !== null ? parseFloat(savedVolume) : 0.5;

        let gameSettings = {
            volume: initialVol,
            effectsEnabled: localStorage.getItem("neonDashEffects") !== "false" 
        };

        volumeSlider.value = gameSettings.volume;

        const coinSound = new Audio('./coin.wav');
        const hitSound = new Audio('./hit.wav');
        const deathSound = new Audio('./death.wav');

        function applyAudioVolumes(val) {
            coinSound.volume = val;
            hitSound.volume = val;
            deathSound.volume = val;
        }

        applyAudioVolumes(gameSettings.volume);
        
        // Aplicar tema inicial
        setTheme(currentThemeKey);
        updateEffectsUI();

        function setTheme(key) {
            currentThemeKey = key;
            localStorage.setItem("neonDashTheme", key);
            const theme = themes[key];
            
            document.body.style.backgroundColor = theme.bg;
            document.getElementById("game-title").innerText = theme.title;
            
            // Actualizar colores del jugador si ya existe
            if (typeof player !== 'undefined') {
                player.color = theme.player;
            }
            
            // Cerrar menú de temas si estaba abierto
            toggleMenu('themes-menu', false);
        }

        function updateVolume(val) {
            gameSettings.volume = parseFloat(val);
            applyAudioVolumes(gameSettings.volume);
            localStorage.setItem("neonDashVolume", val);
        }

        function toggleEffects() {
            gameSettings.effectsEnabled = !gameSettings.effectsEnabled;
            localStorage.setItem("neonDashEffects", gameSettings.effectsEnabled);
            updateEffectsUI();
        }

        function updateEffectsUI() {
            effectsBtn.innerText = gameSettings.effectsEnabled ? "ACTIVADOS" : "DESACTIVADOS";
            effectsBtn.style.borderColor = gameSettings.effectsEnabled ? "#ff00ff" : "#555";
            effectsBtn.style.boxShadow = gameSettings.effectsEnabled ? "0 0 15px #ff00ff" : "none";
            
            if (!gameSettings.effectsEnabled) {
                document.body.style.transition = "none";
                document.body.style.backgroundColor = themes[currentThemeKey].bg;
            } else {
                document.body.style.transition = "background-color 0.8s ease";
            }
        }

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score-val");
        const livesElement = document.getElementById("lives");
        const startMenu = document.getElementById("start-menu");
        const settingsMenu = document.getElementById("settings-menu");
        const themesMenu = document.getElementById("themes-menu");
        const gameOverMenu = document.getElementById("game-over-menu");
        const gameWrapper = document.getElementById("game-wrapper");
        const finalScoreVal = document.getElementById("final-score-val");
        const highScoreVal = document.getElementById("high-score-val");

        function toggleMenu(menuId, show) {
            const menu = document.getElementById(menuId);
            if (show) {
                startMenu.style.display = "none";
                menu.style.display = "flex";
            } else {
                menu.style.display = "none";
                startMenu.style.display = "flex";
            }
        }

        function startGame() {
            startMenu.style.display = "none";
            gameWrapper.style.display = "flex";
            gameActive = true;
            draw();
        }

        const MARGIN = 15; 
        const playerSize = 30;
        const leftLimit = MARGIN;
        const rightLimit = canvas.width - MARGIN - playerSize;

        let score = 0;
        let lives = 3;
        let gameActive = false; 
        let currentLevel = 0;
        const bgColors = ["#0d0221", "#2e004d", "#002b36", "#330000", "#1a1a1a"];

        const player = {
            x: (canvas.width / 2) - (playerSize / 2),
            y: 435,
            size: playerSize,
            color: themes[currentThemeKey].player,
            speed: 8
        };

        let items = [];
        let keys = {};

        canvas.addEventListener("touchmove", (e) => {
            if (!gameActive) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            let touchX = touch.clientX - rect.left;
            let newX = touchX - player.size / 2;
            if (newX < leftLimit) newX = leftLimit;
            if (newX > rightLimit) newX = rightLimit;
            player.x = newX;
        }, { passive: false });

        document.addEventListener("keydown", (e) => keys[e.code] = true);
        document.addEventListener("keyup", (e) => keys[e.code] = false);

        function spawnItem() {
            if (!gameActive) return;
            const isPoint = Math.random() > 0.4;
            const itemSize = 20;
            const spawnX = leftLimit + Math.random() * (canvas.width - (MARGIN * 2) - itemSize);

            items.push({
                x: spawnX,
                y: -30,
                size: itemSize,
                type: isPoint ? "point" : "enemy",
                color: isPoint ? themes[currentThemeKey].point : themes[currentThemeKey].enemy,
                speed: 3.5 + (score / 200)
            });
        }

        function update() {
            if (!gameActive) return;
            if (keys["ArrowLeft"] && player.x > leftLimit) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < rightLimit) player.x += player.speed;

            items.forEach((item, index) => {
                item.y += item.speed;
                if (player.x < item.x + item.size && player.x + player.size > item.x && player.y < item.y + item.size && player.y + player.size > item.y) {
                    if (item.type === "enemy") {
                        items.splice(index, 1);
                        lives--;
                        if (lives <= 0) {
                            gameActive = false;
                            deathSound.play().catch(() => {});
                            showGameOver();
                        } else {
                            hitSound.currentTime = 0; hitSound.play().catch(() => {});
                            updateLivesUI();
                        }
                    } else {
                        coinSound.currentTime = 0; coinSound.play().catch(() => {});
                        score += 10;
                        scoreElement.innerText = score;
                        items.splice(index, 1);
                        checkLevelUp();
                    }
                }
                if (item.y > canvas.height) items.splice(index, 1);
            });
            if (Math.random() < 0.05) spawnItem();
        }

        function showGameOver() {
            let savedRecord = localStorage.getItem("neonDashHighScore") || 0;
            if (score > savedRecord) {
                localStorage.setItem("neonDashHighScore", score);
                savedRecord = score;
            }
            finalScoreVal.innerText = score;
            highScoreVal.innerText = savedRecord;
            gameOverMenu.style.display = "flex";
            document.getElementById("ui-panel").style.opacity = "0";
        }

        function updateLivesUI() {
            livesElement.innerText = "❤️".repeat(lives);
            if (gameSettings.effectsEnabled && currentThemeKey === 'neon') {
                document.body.style.backgroundColor = "#660000";
                setTimeout(() => { 
                    document.body.style.backgroundColor = bgColors[currentLevel % bgColors.length]; 
                }, 150);
            }
        }

        function checkLevelUp() {
            let newLevel = Math.floor(score / 100);
            if (newLevel > currentLevel) {
                currentLevel = newLevel;
                if (gameSettings.effectsEnabled && currentThemeKey === 'neon') {
                    document.body.style.backgroundColor = bgColors[currentLevel % bgColors.length];
                }
            }
        }

        function draw() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const currentTheme = themes[currentThemeKey];
            
            if (gameSettings.effectsEnabled) { 
                ctx.shadowBlur = 15; 
                ctx.shadowColor = currentTheme.shadow; 
            } else { 
                ctx.shadowBlur = 0; 
            }
            
            ctx.fillStyle = currentTheme.player;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            items.forEach(item => {
                if (gameSettings.effectsEnabled) { 
                    ctx.shadowBlur = 12; 
                    ctx.shadowColor = item.color; 
                } else { 
                    ctx.shadowBlur = 0; 
                }
                ctx.fillStyle = item.color;
                ctx.beginPath();
                if(item.type === "point") { 
                    ctx.arc(item.x + 10, item.y + 10, 10, 0, Math.PI * 2); 
                } else { 
                    ctx.fillRect(item.x, item.y, 20, 20); 
                }
                ctx.fill();
            });
            requestAnimationFrame(() => { update(); draw(); });
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
