<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Neon Dash - New Game</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0;
            background-color: #0d0221;
            color: #ff00ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.8s ease;
            touch-action: none;
        }

        /* Título con estilo Glitch/Aesthetic original */
        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            text-shadow: 
                2px 2px #ff00ff, 
                -2px -2px #00ffff;
            margin-bottom: 15px;
            letter-spacing: 4px;
        }

        /* Contenedor con el borde neón que rodea TODO el juego */
        #game-container {
            position: relative;
            border: 4px solid #fff; /* Borde completo */
            box-shadow: 0 0 25px #ff00ff, inset 0 0 10px #ff00ff;
            background: #000;
            line-height: 0;
        }

        canvas {
            display: block;
        }

        .ui-panel {
            display: flex;
            justify-content: space-between;
            width: 360px;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        #lives { filter: drop-shadow(0 0 5px #ff0055); }
        #score-panel { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
    </style>
</head>
<body>

    <h1>NEON DASH</h1>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="360" height="500"></canvas>
    </div>
    
    <div class="ui-panel">
        <div id="lives">❤️❤️❤️</div>
        <div id="score-panel">PUNTOS: <span id="score-val">0</span></div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score-val");
        const livesElement = document.getElementById("lives");

        // --- CARGA DE SONIDOS ---
        const coinSound = new Audio('./coin.wav');
        const hitSound = new Audio('./hit.wav');

        // Función para desbloquear audio en móviles y PC
        function unlockAudio() {
            coinSound.play().then(() => {
                coinSound.pause();
                coinSound.currentTime = 0;
            }).catch(() => {});
            
            hitSound.play().then(() => {
                hitSound.pause();
                hitSound.currentTime = 0;
            }).catch(() => {});

            // Quitamos todos los escuchadores una vez activado
            window.removeEventListener('touchstart', unlockAudio);
            window.removeEventListener('mousedown', unlockAudio);
            window.removeEventListener('keydown', unlockAudio);
        }

        // Se activa con el primer toque, click o tecla presionada
        window.addEventListener('touchstart', unlockAudio);
        window.addEventListener('mousedown', unlockAudio);
        window.addEventListener('keydown', unlockAudio);

        // --- LÓGICA DE LÍMITES ---
        const MARGIN = 15; 
        const playerSize = 30;
        const leftLimit = MARGIN;
        const rightLimit = canvas.width - MARGIN - playerSize;

        let score = 0;
        let lives = 3;
        let gameActive = true;
        let currentLevel = 0;
        const bgColors = ["#0d0221", "#2e004d", "#002b36", "#330000", "#1a1a1a"];

        const player = {
            x: (canvas.width / 2) - (playerSize / 2),
            y: 435,
            size: playerSize,
            color: "#ff00ff",
            speed: 8
        };

        let items = [];
        let keys = {};

        // Táctil
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            let touchX = touch.clientX - rect.left;
            let newX = touchX - player.size / 2;
            if (newX < leftLimit) newX = leftLimit;
            if (newX > rightLimit) newX = rightLimit;
            player.x = newX;
        }, { passive: false });

        // Teclado
        document.addEventListener("keydown", (e) => keys[e.code] = true);
        document.addEventListener("keyup", (e) => keys[e.code] = false);

        function spawnItem() {
            const isPoint = Math.random() > 0.4;
            const itemSize = 20;
            const spawnX = leftLimit + Math.random() * (canvas.width - (MARGIN * 2) - itemSize);

            items.push({
                x: spawnX,
                y: -30,
                size: itemSize,
                type: isPoint ? "point" : "enemy",
                color: isPoint ? "#ffff00" : "#00ffff",
                speed: 3.5 + (score / 200)
            });
        }

        function update() {
            if (!gameActive) return;

            if (keys["ArrowLeft"] && player.x > leftLimit) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < rightLimit) player.x += player.speed;

            items.forEach((item, index) => {
                item.y += item.speed;

                if (
                    player.x < item.x + item.size &&
                    player.x + player.size > item.x &&
                    player.y < item.y + item.size &&
                    player.y + player.size > item.y
                ) {
                    if (item.type === "enemy") {
                        // Sonido de golpe
                        hitSound.currentTime = 0; 
                        hitSound.play().catch(() => {});

                        lives--;
                        updateLivesUI();
                        items.splice(index, 1);
                        if (lives <= 0) {
                            gameActive = false;
                            alert("GAME OVER! PUNTOS: " + score);
                            location.reload();
                        }
                    } else {
                        // Sonido de moneda
                        coinSound.currentTime = 0; 
                        coinSound.play().catch(() => {});

                        score += 10;
                        scoreElement.innerText = score;
                        items.splice(index, 1);
                        checkLevelUp();
                    }
                }
                if (item.y > canvas.height) items.splice(index, 1);
            });

            if (Math.random() < 0.05) spawnItem();
        }

        function updateLivesUI() {
            livesElement.innerText = "❤️".repeat(lives);
            document.body.style.backgroundColor = "#660000";
            setTimeout(() => {
                document.body.style.backgroundColor = bgColors[currentLevel % bgColors.length];
            }, 150);
        }

        function checkLevelUp() {
            let newLevel = Math.floor(score / 100);
            if (newLevel > currentLevel) {
                currentLevel = newLevel;
                document.body.style.backgroundColor = bgColors[currentLevel % bgColors.length];
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Jugador
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Items
            items.forEach(item => {
                ctx.shadowBlur = 12;
                ctx.shadowColor = item.color;
                ctx.fillStyle = item.color;
                ctx.beginPath();
                if(item.type === "point") {
                    ctx.arc(item.x + 10, item.y + 10, 10, 0, Math.PI * 2);
                } else {
                    ctx.fillRect(item.x, item.y, 20, 20);
                }
                ctx.fill();
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
