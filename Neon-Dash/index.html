<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0221">
    <title>Neon Dash</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0;
            background-color: #0d0221;
            color: #ff00ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.8s ease;
            touch-action: none;
        }

        .neon-title {
            font-size: 2.5rem;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            text-shadow: 
                2px 2px #ff00ff, 
                -2px -2px #00ffff;
            margin-bottom: 15px;
            letter-spacing: 4px;
            text-align: center;
        }

        #start-menu, #game-over-menu {
            position: absolute;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(13, 2, 33, 0.95);
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        #game-over-menu {
            display: none;
        }

        #menu-icon-container {
            margin: 10px 0 25px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #menu-icon {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px #ff00ff);
        }

        .btn-neon {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #fff;
            background: transparent;
            border: 3px solid #ff00ff;
            cursor: pointer;
            box-shadow: 0 0 15px #ff00ff;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 20px;
        }

        .btn-neon:hover {
            background: #ff00ff;
            box-shadow: 0 0 30px #ff00ff;
        }

        .final-score {
            font-size: 1.8rem;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            margin: 10px 0;
        }

        .high-score {
            font-size: 1.2rem;
            color: #ffff00;
            text-shadow: 0 0 8px #ffff00;
            margin-bottom: 10px;
        }

        #game-wrapper {
            display: none; 
            flex-direction: column;
            align-items: center;
        }

        #game-container {
            position: relative;
            border: 4px solid #fff;
            box-shadow: 0 0 25px #ff00ff, inset 0 0 10px #ff00ff;
            background: #000;
            line-height: 0;
        }

        canvas {
            display: block;
        }

        .ui-panel {
            display: flex;
            justify-content: space-between;
            width: 360px;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        #lives { filter: drop-shadow(0 0 5px #ff0055); }
        #score-panel { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
    </style>
</head>
<body>

    <div id="start-menu">
        <h1 class="neon-title">NEON DASH</h1>
        <div id="menu-icon-container">
            <img src="favicon.png" alt="Icono" id="menu-icon">
        </div>
        <button class="btn-neon" onclick="startGame()">JUGAR</button>
    </div>

    <div id="game-over-menu">
        <h1 class="neon-title" style="text-shadow: 2px 2px #ff0000, -2px -2px #ff00ff;">¡FIN DEL JUEGO!</h1>
        <p class="final-score">PUNTOS: <span id="final-score-val">0</span></p>
        <p class="high-score">RÉCORD: <span id="high-score-val">0</span></p>
        <button class="btn-neon" onclick="location.reload()" style="border-color: #00ffff; box-shadow: 0 0 15px #00ffff;">REINTENTAR</button>
    </div>

    <div id="game-wrapper">
        <h1 class="neon-title">NEON DASH</h1>
        <div id="game-container">
            <canvas id="gameCanvas" width="360" height="500"></canvas>
        </div>
        <div class="ui-panel" id="ui-panel">
            <div id="lives">❤️❤️❤️</div>
            <div id="score-panel">PUNTOS: <span id="score-val">0</span></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score-val");
        const livesElement = document.getElementById("lives");
        const startMenu = document.getElementById("start-menu");
        const gameOverMenu = document.getElementById("game-over-menu");
        const gameWrapper = document.getElementById("game-wrapper");
        const finalScoreVal = document.getElementById("final-score-val");
        const highScoreVal = document.getElementById("high-score-val");

        const coinSound = new Audio('./coin.wav');
        const hitSound = new Audio('./hit.wav');
        const deathSound = new Audio('./death.wav');

        function startGame() {
            coinSound.play().then(() => { coinSound.pause(); coinSound.currentTime = 0; }).catch(() => {});
            hitSound.play().then(() => { hitSound.pause(); hitSound.currentTime = 0; }).catch(() => {});
            deathSound.play().then(() => { deathSound.pause(); deathSound.currentTime = 0; }).catch(() => {});

            startMenu.style.display = "none";
            gameWrapper.style.display = "flex";

            gameActive = true;
            draw();
        }

        const MARGIN = 15; 
        const playerSize = 30;
        const leftLimit = MARGIN;
        const rightLimit = canvas.width - MARGIN - playerSize;

        let score = 0;
        let lives = 3;
        let gameActive = false; 
        let currentLevel = 0;
        const bgColors = ["#0d0221", "#2e004d", "#002b36", "#330000", "#1a1a1a"];

        const player = {
            x: (canvas.width / 2) - (playerSize / 2),
            y: 435,
            size: playerSize,
            color: "#ff00ff",
            speed: 8
        };

        let items = [];
        let keys = {};

        canvas.addEventListener("touchmove", (e) => {
            if (!gameActive) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            let touchX = touch.clientX - rect.left;
            let newX = touchX - player.size / 2;
            if (newX < leftLimit) newX = leftLimit;
            if (newX > rightLimit) newX = rightLimit;
            player.x = newX;
        }, { passive: false });

        document.addEventListener("keydown", (e) => keys[e.code] = true);
        document.addEventListener("keyup", (e) => keys[e.code] = false);

        function spawnItem() {
            if (!gameActive) return;
            const isPoint = Math.random() > 0.4;
            const itemSize = 20;
            const spawnX = leftLimit + Math.random() * (canvas.width - (MARGIN * 2) - itemSize);

            items.push({
                x: spawnX,
                y: -30,
                size: itemSize,
                type: isPoint ? "point" : "enemy",
                color: isPoint ? "#ffff00" : "#00ffff",
                speed: 3.5 + (score / 200)
            });
        }

        function update() {
            if (!gameActive) return;

            if (keys["ArrowLeft"] && player.x > leftLimit) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < rightLimit) player.x += player.speed;

            items.forEach((item, index) => {
                item.y += item.speed;

                if (
                    player.x < item.x + item.size &&
                    player.x + player.size > item.x &&
                    player.y < item.y + item.size &&
                    player.y + player.size > item.y
                ) {
                    if (item.type === "enemy") {
                        items.splice(index, 1);
                        lives--;
                        
                        if (lives <= 0) {
                            gameActive = false;
                            deathSound.play().catch(() => {});
                            showGameOver();
                        } else {
                            hitSound.currentTime = 0; 
                            hitSound.play().catch(() => {});
                            updateLivesUI();
                        }
                    } else {
                        coinSound.currentTime = 0; 
                        coinSound.play().catch(() => {});
                        score += 10;
                        scoreElement.innerText = score;
                        items.splice(index, 1);
                        checkLevelUp();
                    }
                }
                if (item.y > canvas.height) items.splice(index, 1);
            });

            if (Math.random() < 0.05) spawnItem();
        }

        function showGameOver() {
            // Lógica de Récord Máximo
            let savedRecord = localStorage.getItem("neonDashHighScore") || 0;
            if (score > savedRecord) {
                localStorage.setItem("neonDashHighScore", score);
                savedRecord = score;
            }

            finalScoreVal.innerText = score;
            highScoreVal.innerText = savedRecord;
            gameOverMenu.style.display = "flex";
            document.getElementById("ui-panel").style.opacity = "0";
        }

        function updateLivesUI() {
            livesElement.innerText = "❤️".repeat(lives);
            document.body.style.backgroundColor = "#660000";
            setTimeout(() => {
                document.body.style.backgroundColor = bgColors[currentLevel % bgColors.length];
            }, 150);
        }

        function checkLevelUp() {
            let newLevel = Math.floor(score / 100);
            if (newLevel > currentLevel) {
                currentLevel = newLevel;
                document.body.style.backgroundColor = bgColors[currentLevel % bgColors.length];
            }
        }

        function draw() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            items.forEach(item => {
                ctx.shadowBlur = 12;
                ctx.shadowColor = item.color;
                ctx.fillStyle = item.color;
                ctx.beginPath();
                if(item.type === "point") {
                    ctx.arc(item.x + 10, item.y + 10, 10, 0, Math.PI * 2);
                } else {
                    ctx.fillRect(item.x, item.y, 20, 20);
                }
                ctx.fill();
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
