<!DOCTYPE html>
<html lang="es" data-theme="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PizzaChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Pantalla de Autenticación -->
        <section id="auth-screen" class="screen">
            <div class="auth-card">
                <h1>🍕 PizzaChat</h1>
                <input type="email" id="email" placeholder="Correo electrónico">
                <input type="password" id="password" placeholder="Contraseña">
                <div class="auth-buttons">
                    <button id="login-btn">Entrar</button>
                    <button id="register-btn">Registrarse</button>
                </div>
                <p id="forgot-password">¿Olvidaste tu contraseña?</p>
            </div>
        </section>

        <!-- Pantalla Principal -->
        <section id="main-screen" class="screen hidden">
            <aside id="sidebar">
                <header>
                    <img id="my-avatar" src="https://via.placeholder.com/40" alt="Perfil">
                    <button id="settings-btn">⚙️</button>
                    <button id="logout-btn">Salir</button>
                </header>
                <div id="search-bar">
                    <input type="text" id="find-user" placeholder="Buscar amigos por ID...">
                </div>
                <div id="chat-list"></div>
            </aside>

            <main id="chat-window">
                <header id="chat-header">
                    <h2 id="target-name">Selecciona un chat</h2>
                    <span id="target-status"></span>
                </header>
                <div id="messages-container"></div>
                <footer id="input-area">
                    <textarea id="message-input" placeholder="Escribe un mensaje o pega una URL..."></textarea>
                    <button id="send-btn">➤</button>
                </footer>
            </main>
        </section>
    </div>

    <!-- Scripts de Firebase (V9 Modular) -->
    <script type="module" src="script.js"></script>
</body>
</html>
