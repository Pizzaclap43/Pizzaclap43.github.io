<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PizzaChat - Seguridad Total</title>
    <style>
        :root { --piz-orange: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 10px; }
        .auth-card { padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 12px; width: 320px; }
        
        header { background: var(--piz-orange); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); max-width: 80%; align-self: flex-start; }
        .msg b { color: var(--piz-orange); display: block; font-size: 0.85em; }
        
        #input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        
        .btn-main { background: var(--piz-orange); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-secondary { background: #ecf0f1; color: #2c3e50; border: 1px solid #bdc3c7; cursor: pointer; font-weight: bold; }
        
        .hidden { display: none !important; }
        #error-msg { color: #e74c3c; font-size: 0.85em; text-align: center; min-height: 1.2em; }
        #verify-banner { background: #f1c40f; color: #000; padding: 10px; text-align: center; font-size: 0.9em; font-weight: bold; }
        .reset-link { font-size: 0.75em; text-align: center; color: #3498db; cursor: pointer; text-decoration: underline; margin-top: -5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="auth-card">
            <h2 style="text-align: center; margin: 0; color: var(--piz-orange);">🍕 PizzaChat</h2>
            <p id="error-msg"></p>
            <input type="text" id="nickname" placeholder="Tu Apodo (Solo registro)">
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="pass" placeholder="Contraseña">
            
            <button id="btnEntrar" class="btn-main">Iniciar Sesión</button>
            <div class="reset-link" onclick="restablecerClave()">¿Olvidaste tu contraseña?</div>
            <button id="btnRegistro" class="btn-secondary">Crear Cuenta Nueva</button>
        </div>
    </div>

    <div id="verify-banner" class="hidden">
        ⚠️ Debes verificar tu correo para usar el chat. 
        <button onclick="reviarVerificacion()" style="padding: 2px 10px; margin-left: 10px;">Ya lo verifiqué</button>
    </div>

    <header>
        <span style="font-weight: bold;">PIZZACHAT GLOBAL</span>
        <button id="btnSalir" style="background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 12px; font-size: 0.8em; border-radius: 4px; cursor: pointer;">Salir</button>
    </header>

    <div id="chat"></div>

    <div id="input-area" class="hidden">
        <input type="text" id="mensaje" placeholder="Escribe un mensaje..." style="flex: 1;" autocomplete="off">
        <button id="btnEnviar" class="btn-main">Enviar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_o9hukEo6Pol4NcncYmP_9M5ltGfFHqQ",
            authDomain: "pizzachat-f44a8.firebaseapp.com",
            databaseURL: "https://pizzachat-f44a8-default-rtdb.firebaseio.com",
            projectId: "pizzachat-f44a8",
            storageBucket: "pizzachat-f44a8.firebasestorage.app",
            messagingSenderId: "744384846729",
            appId: "1:744384846729:web:02d5072be2e0b4cb885f58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const chatRef = ref(db, 'mensajes');

        let miUsuario = null;
        const errorArea = document.getElementById('error-msg');

        // --- RESTABLECER CONTRASEÑA ---
        window.restablecerClave = async () => {
            const email = document.getElementById('email').value;
            if (!email) {
                errorArea.innerText = "Escribe tu correo arriba primero.";
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Correo de restablecimiento enviado a " + email);
                errorArea.innerText = "";
            } catch (error) {
                errorArea.innerText = "Error al enviar el correo.";
            }
        };

        // --- ENTRAR ---
        document.getElementById('btnEntrar').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                errorArea.innerText = "Error: Credenciales incorrectas.";
            }
        };

        // --- REGISTRO ---
        document.getElementById('btnRegistro').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const nick = document.getElementById('nickname').value;

            if(!nick) { errorArea.innerText = "Elige un apodo."; return; }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(userCredential.user, { displayName: nick });
                await sendEmailVerification(userCredential.user);
                alert("¡Cuenta creada! Revisa tu correo para verificar.");
            } catch (error) {
                errorArea.innerText = "Error al registrar.";
            }
        };

        document.getElementById('btnSalir').onclick = () => signOut(auth);

        window.reviarVerificacion = () => {
            auth.currentUser.reload().then(() => {
                location.reload();
            });
        };

        onAuthStateChanged(auth, (user) => {
            const screen = document.getElementById('login-screen');
            const chatBox = document.getElementById('chat');
            const banner = document.getElementById('verify-banner');
            const inputArea = document.getElementById('input-area');

            if (user) {
                miUsuario = user;
                screen.classList.add('hidden');
                
                if (!user.emailVerified) {
                    banner.classList.remove('hidden');
                    inputArea.classList.add('hidden');
                    chatBox.innerHTML = "<p style='text-align:center; padding:20px;'>Verifica tu cuenta para chatear.</p>";
                } else {
                    banner.classList.add('hidden');
                    inputArea.classList.remove('hidden');
                    chatBox.innerHTML = "";
                    
                    onChildAdded(chatRef, (snapshot) => {
                        const data = snapshot.val();
                        const div = document.createElement('div');
                        div.className = 'msg';
                        const nombreAMostrar = data.nombre || data.usuario.split('@')[0];
                        div.innerHTML = `<b>${nombreAMostrar}</b> ${data.texto}`;
                        chatBox.appendChild(div);
                        chatBox.scrollTop = chatBox.scrollHeight;
                    });
                }
            } else {
                miUsuario = null;
                screen.classList.remove('hidden');
                banner.classList.add('hidden');
            }
        });

        const enviar = () => {
            const input = document.getElementById('mensaje');
            if (input.value.trim() && miUsuario && miUsuario.emailVerified) {
                push(chatRef, {
                    nombre: miUsuario.displayName || miUsuario.email.split('@')[0],
                    usuario: miUsuario.email,
                    texto: input.value,
                    timestamp: serverTimestamp()
                });
                input.value = "";
            }
        };

        document.getElementById('btnEnviar').onclick = enviar;
        document.getElementById('mensaje').onkeypress = (e) => { if(e.key === 'Enter') enviar(); };
    </script>
</body>
</html>
