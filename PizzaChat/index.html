<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PizzaChat - Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="pizza-loader">🍕</div>
        <p id="splash-status">Iniciando PizzaChat...</p>
    </div>

    <div id="login-screen">
        <div class="auth-card">
            <h2 style="text-align: center; margin: 0; color: var(--piz-orange);">🍕 PizzaChat</h2>
            <p id="error-msg"></p>
            <input type="text" id="nickname" placeholder="Tu Apodo (Solo registro)">
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="pass" placeholder="Contraseña">
            
            <button id="btnEntrar" class="btn-main">Iniciar Sesión</button>
            <div class="reset-link" style="text-align:center; cursor:pointer; font-size: 0.9em; text-decoration: underline;" onclick="restablecerClave()">¿Olvidaste tu contraseña?</div>
            <button id="btnRegistro" class="btn-secondary" style="margin-top: 10px;">Crear Cuenta Nueva</button>
        </div>
    </div>

    <div id="verify-banner" class="hidden">
        ⚠️ Verifica tu correo para usar el chat. 
        <button id="btnVerificado" style="padding: 2px 10px; margin-left: 10px;">Ya lo verifiqué</button>
    </div>

    <header>
        <span style="font-weight: bold;">PIZZACHAT GLOBAL</span>
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="theme-selector">
                <option value="light">☀️ Claro</option>
                <option value="dark">🌙 Oscuro</option>
                <option value="system">🖥️ Sistema</option>
            </select>
            <button id="btnSalir" class="btn-logout">Salir</button>
        </div>
    </header>

    <div id="chat">
        <!-- Indicador de carga para mensajes viejos -->
        <div id="load-more" class="hidden" style="text-align:center; padding: 10px; color: var(--piz-orange); font-size: 0.8em;"> Cargando historial... </div>
    </div>

    <div id="input-area" class="hidden">
        <textarea id="mensaje" placeholder="Escribe un mensaje o pega un link de imagen/YouTube..." rows="1"></textarea>
        <button id="btnEnviar" class="btn-main">Enviar</button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
