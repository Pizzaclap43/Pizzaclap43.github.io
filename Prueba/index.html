<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dash - Aesthetic Game</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0221;
            color: #ff00ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            text-shadow: 3px 3px #00ffff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #game-container {
            position: relative;
            border: 4px solid #00ffff;
            box-shadow: 0 0 20px #ff00ff, inset 0 0 10px #00ffff;
            background: #000;
        }

        canvas {
            display: block;
        }

        .stats {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px #4b0082;
        }
    </style>
</head>
<body>

    <h1>Neon Dash</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="500"></canvas>
    </div>
    <div class="stats">PUNTOS: <span id="score">0</span></div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        let score = 0;
        let gameActive = true;

        // Jugador (un cuadrado aesthetic)
        const player = {
            x: 180,
            y: 440,
            size: 30,
            color: "#ff00ff",
            speed: 7
        };

        // Enemigos y Puntos
        let items = [];
        const itemTypes = [
            { type: "enemy", color: "#00ffff", points: 0 }, // Obstáculo
            { type: "point", color: "#ffff00", points: 10 } // Punto
        ];

        // Controles
        let keys = {};
        document.addEventListener("keydown", (e) => keys[e.code] = true);
        document.addEventListener("keyup", (e) => keys[e.code] = false);

        function spawnItem() {
            const type = Math.random() > 0.3 ? itemTypes[0] : itemTypes[1];
            items.push({
                x: Math.random() * (canvas.width - 20),
                y: -20,
                size: 20,
                ...type,
                speed: 3 + (score / 100) // Aumenta dificultad
            });
        }

        function update() {
            if (!gameActive) return;

            // Movimiento jugador
            if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < canvas.width - player.size) player.x += player.speed;

            // Movimiento items
            items.forEach((item, index) => {
                item.y += item.speed;

                // Colisión
                if (
                    player.x < item.x + item.size &&
                    player.x + player.size > item.x &&
                    player.y < item.y + item.size &&
                    player.y + player.size > item.y
                ) {
                    if (item.type === "enemy") {
                        gameActive = false;
                        alert("GAME OVER! Puntos: " + score);
                        location.reload();
                    } else {
                        score += item.points;
                        scoreElement.innerText = score;
                        items.splice(index, 1);
                    }
                }

                // Limpiar items fuera de pantalla
                if (item.y > canvas.height) items.splice(index, 1);
            });

            if (Math.random() < 0.05) spawnItem();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar Jugador con resplandor
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Dibujar Items
            items.forEach(item => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = item.color;
                ctx.fillStyle = item.color;
                ctx.beginPath();
                ctx.arc(item.x + 10, item.y + 10, item.size / 2, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
