<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Neon Dash Mobile</title>
    <style>
        /* Estilos anteriores + ajustes para móvil */
        body {
            margin: 0;
            background-color: #0d0221;
            color: #ff00ff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s;
            touch-action: none; /* Evita que la pantalla se mueva al jugar */
        }

        #game-container {
            position: relative;
            border: 3px solid #fff;
            box-shadow: 0 0 15px #ff00ff;
            background: #000;
            max-width: 95vw; /* Se ajusta al ancho del celular */
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .ui-panel {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 400px;
            margin-top: 10px;
            font-size: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 style="margin: 5px; text-shadow: 2px 2px #00ffff;">NEON DASH</h2>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="360" height="500"></canvas>
    </div>
    
    <div class="ui-panel">
        <div><span id="lives">❤️❤️❤️</span></div>
        <div>SCORE: <span id="score-val">0</span></div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score-val");
        const livesElement = document.getElementById("lives");

        let score = 0;
        let lives = 3;
        let gameActive = true;
        let currentLevel = 0;
        const bgColors = ["#0d0221", "#4b0082", "#1a0033", "#330000"];

        const player = {
            x: 165,
            y: 420,
            size: 30,
            color: "#ff00ff"
        };

        let items = [];

        // --- CONTROLES TÁCTILES ---
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault(); // Evita scroll
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            
            // El jugador sigue el dedo en el eje X
            player.x = touchX - player.size / 2;

            // Límites para que no se salga
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
        }, { passive: false });

        // --- CONTROLES TECLADO (Para PC) ---
        let keys = {};
        document.addEventListener("keydown", (e) => keys[e.code] = true);
        document.addEventListener("keyup", (e) => keys[e.code] = false);

        function spawnItem() {
            const isPoint = Math.random() > 0.4;
            items.push({
                x: Math.random() * (canvas.width - 25),
                y: -30,
                size: 20,
                type: isPoint ? "point" : "enemy",
                color: isPoint ? "#ffff00" : "#00ffff",
                speed: 3 + (score / 150)
            });
        }

        function update() {
            if (!gameActive) return;

            // Movimiento por teclado
            if (keys["ArrowLeft"] && player.x > 0) player.x -= 7;
            if (keys["ArrowRight"] && player.x < canvas.width - player.size) player.x += 7;

            items.forEach((item, index) => {
                item.y += item.speed;

                if (
                    player.x < item.x + item.size &&
                    player.x + player.size > item.x &&
                    player.y < item.y + item.size &&
                    player.y + player.size > item.y
                ) {
                    if (item.type === "enemy") {
                        lives--;
                        updateLivesUI();
                        items.splice(index, 1);
                        if (lives <= 0) {
                            alert("GAME OVER! SCORE: " + score);
                            location.reload();
                        }
                    } else {
                        score += 10;
                        scoreElement.innerText = score;
                        items.splice(index, 1);
                        checkLevelUp();
                    }
                }
                if (item.y > canvas.height) items.splice(index, 1);
            });

            if (Math.random() < 0.05) spawnItem();
        }

        function updateLivesUI() {
            livesElement.innerText = "❤️".repeat(lives);
            document.body.style.backgroundColor = "#ff0000";
            setTimeout(() => {
                document.body.style.backgroundColor = bgColors[currentLevel % bgColors.length];
            }, 100);
        }

        function checkLevelUp() {
            let newLevel = Math.floor(score / 100);
            if (newLevel > currentLevel) {
                currentLevel = newLevel;
                document.body.style.backgroundColor = bgColors[currentLevel % bgColors.length];
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Jugador
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Items
            items.forEach(item => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = item.color;
                ctx.fillStyle = item.color;
                ctx.beginPath();
                if(item.type === "point") {
                    ctx.arc(item.x+10, item.y+10, 10, 0, Math.PI*2);
                } else {
                    ctx.fillRect(item.x, item.y, 20, 20);
                }
                ctx.fill();
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
