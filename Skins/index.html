<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skins de ClassiCube - Descargas</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #ffcc00;
            --button-hover: #e6b800;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .skin-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid #333;
        }

        .skin-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .skin-preview {
            width: 128px;
            height: 128px;
            image-rendering: pixelated;
            margin-bottom: 15px;
            background-color: #2a2a2a;
            border-radius: 5px;
            object-fit: contain;
        }

        .username {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .download-btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: #000;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background-color: var(--button-hover);
        }

        footer {
            margin-top: 50px;
            font-size: 0.8em;
            color: #777;
        }
    </style>
</head>
<body>

    <h1>Descarga de Skins ClassiCube</h1>

    <div class="grid-container" id="skin-grid">
        <!-- Las skins se generan aquí -->
    </div>

    <footer>
        <p>Servidor de Skins - Realizado para la comunidad de ClassiCube</p>
    </footer>

    <script>
        const players = [
            "pizzaclap43", "CatMeow98", "AndresDMC", "ElmichiYT", 
            "RIP_SAURIO", "jose_120", "azul29", "37equiel", 
            "StevenCA.", "PAdrian1519", "Solidcat2", "Lucas_M.G.", 
            "LRTER_", "Sans.exe", "Vhs.Sans", "Josue2209", "magma.mp4",
            "tGreysVT", "_OmegaBananas_", "impresson", "emicics"
        ];

        const grid = document.getElementById('skin-grid');

        players.forEach(player => {
            const skinUrl = `https://cdn.classicube.net/skin/${player}.png`;
            
            const card = document.createElement('div');
            card.className = 'skin-card';
            
            card.innerHTML = `
                <img src="${skinUrl}" alt="${player}" class="skin-preview" onerror="this.src='https://www.classicube.net/static/img/skin_placeholder.png'">
                <span class="username">${player}</span>
                <a href="${skinUrl}" download="${player}_skin.png" target="_blank" class="download-btn">Descargar PNG</a>
            `;
            
            grid.appendChild(card);
        });
    </script>

</body>
</html>
