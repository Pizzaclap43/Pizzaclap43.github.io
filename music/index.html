<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergente - Plataforma de Música</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">🎵 Emergente<span>Música</span></div>
        <div class="user-status" id="userStatusText">Cargando...</div>
    </header>

    <main class="container">
        <section class="feed-section">
            <h2>Últimos Lanzamientos</h2>
            <div class="songs-grid" id="songsGrid">
                <p class="loading-text">Buscando música en la nube...</p>
            </div>
        </section>

        <section class="panel-section">
            <div id="authPanel" class="card">
                <h3 id="authTitle">Iniciar Sesión</h3>
                <p class="subtitle">Solo para artistas emergentes</p>
                
                <form id="authForm">
                    <div class="form-group" id="nameField" style="display: none;">
                        <label for="artistName">Nombre Artístico</label>
                        <input type="text" id="artistName" placeholder="Ej. DJ Salsero">
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" required placeholder="tu@correo.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
                    </div>
                    <button type="submit" id="btnAuthSubmit" class="btn-primary">Entrar</button>
                </form>
                
                <p class="toggle-auth">
                    ¿No tienes cuenta? <span id="toggleAuthMode">Regístrate como artista</span>
                </p>
            </div>

            <div id="uploadPanel" class="card" style="display: none;">
                <h3>Subir Nuevo Tema</h3>
                <p class="subtitle">Comparte tu música con el mundo</p>
                
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="songTitle">Título de la Canción</label>
                        <input type="text" id="songTitle" required placeholder="Ej. Salsa Brava Vol. 1">
                    </div>
                    <div class="form-group">
                        <label for="catboxUrl">Enlace de Audio (Catbox)</label>
                        <input type="url" id="catboxUrl" required placeholder="https://files.catbox.moe/xxxxxx.mp3">
                        <small>Sube tu archivo a Catbox.moe y pega el link directo aquí.</small>
                    </div>
                    <button type="submit" class="btn-success">Publicar Canción</button>
                </form>
                <button id="btnLogout" class="btn-secondary">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
