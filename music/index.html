<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Music - La Radio de los Emergentes</title>
    <link rel="stylesheet" href="style.css">
    <!-- Iconos para el buscador y el reproductor -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="brand">🍕 Pizza<span>Music</span></div>
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="¿Qué quieres escuchar hoy, chamo?">
        </div>
        <div class="user-area" id="userStatusText">Invitado</div>
    </header>

    <main class="app-container">
        <!-- ZONA DEL FEED MUSICAL -->
        <section class="music-feed">
            <h2>Novedades Recientes</h2>
            <div class="songs-grid" id="songsGrid">
                <p class="status-msg">Cargando el horno musical...</p>
            </div>
        </section>

        <!-- PANEL LATERAL (LOGIN Y SUBIDA) -->
        <aside class="side-panel">
            <div id="authPanel" class="pizza-card">
                <h3 id="authTitle">Zona de Artistas</h3>
                <p class="card-desc">Únete a la familia de Pizza Music</p>
                
                <form id="authForm">
                    <div class="field" id="nameField" style="display: none;">
                        <input type="text" id="artistName" placeholder="Nombre Artístico">
                    </div>
                    <div class="field">
                        <input type="email" id="email" required placeholder="Correo electrónico">
                    </div>
                    <div class="field">
                        <input type="password" id="password" required placeholder="Contraseña">
                    </div>
                    <button type="submit" id="btnAuthSubmit" class="btn-main">Entrar</button>
                </form>
                
                <p class="toggle-text">¿Nuevo por aquí? <span id="toggleAuthMode">Regístrate</span></p>
            </div>

            <div id="uploadPanel" class="pizza-card" style="display: none;">
                <h3>Subir a la Pizza</h3>
                <form id="uploadForm">
                    <div class="field">
                        <input type="text" id="songTitle" required placeholder="Título del Tema">
                    </div>
                    <div class="field">
                        <input type="url" id="catboxUrl" required placeholder="Enlace Catbox (.mp3)">
                    </div>
                    <button type="submit" class="btn-success">Publicar Tema</button>
                </form>
                <button id="btnLogout" class="btn-outline">Salir de la cuenta</button>
            </div>
        </aside>
    </main>

    <!-- REPRODUCTOR GLOBAL FIJO -->
    <footer class="player-bar" id="globalPlayer" style="display: none;">
        <div class="now-playing">
            <div class="song-meta">
                <span id="playerTitle" class="player-title">Título</span>
                <span id="playerArtist" class="player-artist">Artista</span>
            </div>
        </div>
        <div class="player-controls">
            <audio id="mainAudio" controls autoplay></audio>
        </div>
        <div class="player-spacer"></div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
