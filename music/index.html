<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Music | Premium Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div id="toast-container"></div>

    <header class="main-header">
        <div class="brand"><i class="fa-solid fa-compact-disc spin-slow" id="vinyl"></i> Pizza<span>Music</span></div>
        <div class="search-bar">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="searchInput" placeholder="Busca tu vibra hoy...">
        </div>
        <div class="user-area"><span id="userStatusText">Invitado</span></div>
    </header>

    <main class="app-container">
        <section class="music-feed">
            <h2 class="section-title">Tu Librería</h2>
            <div class="songs-grid" id="songsGrid"></div>
        </section>

        <aside class="side-panel">
            <div id="authPanel" class="glass-card">
                <h3 id="authTitle">Studio Access</h3>
                <form id="authForm">
                    <div class="field" id="nameField" style="display: none;"><input type="text" id="artistName" placeholder="Nombre Artístico"></div>
                    <div class="field"><input type="email" id="email" required placeholder="Correo"></div>
                    <div class="field"><input type="password" id="password" required placeholder="Contraseña"></div>
                    <button type="submit" id="btnAuthSubmit" class="btn-glow">Entrar</button>
                </form>
                <p class="toggle-text"><span id="toggleAuthMode">Registrarse</span></p>
            </div>
            <div id="uploadPanel" class="glass-card" style="display: none;">
                <h3>Subir Track</h3>
                <form id="uploadForm">
                    <div class="field"><input type="text" id="songTitle" required placeholder="Título"></div>
                    <div class="field"><input type="url" id="catboxUrl" required placeholder="Link .mp3"></div>
                    <button type="submit" class="btn-glow btn-success">Publicar</button>
                </form>
                <button id="btnLogout" class="btn-outline">Salir</button>
            </div>
        </aside>
    </main>

    <footer class="advanced-player" id="playerUI">
        <audio id="audioElement" crossorigin="anonymous"></audio>
        <div class="player-content">
            <div class="track-info">
                <div class="track-art" id="visualizer"><i class="fa-solid fa-music"></i></div>
                <div class="track-details">
                    <span id="currentStationName" class="track-title">Selecciona un tema</span>
                    <span class="track-artist">Pizza Music Cloud</span>
                </div>
            </div>
            <div class="player-core">
                <div class="controls-buttons">
                    <button class="ctrl-btn" onclick="prevStation()"><i class="fas fa-step-backward"></i></button>
                    <button class="ctrl-btn play-btn" id="playPauseBtn" onclick="togglePlayPause()"><i class="fas fa-play-circle"></i></button>
                    <button class="ctrl-btn" onclick="nextStation()"><i class="fas fa-step-forward"></i></button>
                </div>
            </div>
            <div class="player-extras">
                <button class="ctrl-btn eq-btn" id="btnEqToggle"><i class="fas fa-sliders-h"></i> EQ</button>
                <div class="volume-control">
                    <i class="fas fa-volume-down" id="muteIcon" onclick="toggleMute()"></i>
                    <input type="range" id="volumeSlider" class="slider" min="0" max="1" step="0.1" value="0.8">
                </div>
            </div>
        </div>
        <div class="eq-panel" id="eqPanel">
            <div class="eq-band"><input type="range" id="eqBass" class="slider-vertical" min="-15" max="15" value="0"><span>Bass</span></div>
            <div class="eq-band"><input type="range" id="eqMid" class="slider-vertical" min="-15" max="15" value="0"><span>Mid</span></div>
            <div class="eq-band"><input type="range" id="eqTreble" class="slider-vertical" min="-15" max="15" value="0"><span>High</span></div>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
