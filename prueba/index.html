<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solitario Clásico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-window">
        <div class="window-header">
            <span>Solitario</span>
            <div class="window-controls">
                <span>_</span><span>🗖</span><span>X</span>
            </div>
        </div>
        <div class="green-felt" id="table">
            <div class="top-row">
                <div class="deck-area">
                    <div class="card back" id="deck-btn"></div>
                    <div class="card empty" id="waste"></div>
                </div>
                <div class="foundation-area">
                    <div class="card empty"></div>
                    <div class="card empty"></div>
                    <div class="card empty"></div>
                    <div class="card empty"></div>
                </div>
            </div>
            <div class="tableau" id="tableau">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
