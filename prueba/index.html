<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error de Sistema</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Carga el clásico fondo Bliss de Windows XP */
            background-image: url('https://images.ecestaticos.com/c995Yvr-fcMZuDF4I37gFfWkhog=/147x1:852x499/992x700/filters:fill(white):format(jpg)/f.elconfidencial.com%2Foriginal%2F9cd%2F50d%2F819%2F9cd50d819fee187c73bdf230e6f543b3.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            overflow: hidden;
            font-family: Tahoma, "Segoe UI", sans-serif;
            user-select: none;
        }

        .xp-window {
            position: absolute;
            width: 350px;
            background: #ece9d8;
            border: 1px solid #0058e6;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .xp-titlebar {
            background: linear-gradient(to right, #0058e6 0%, #3a93ff 50%, #0058e6 100%);
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top-left-radius: 7px;
            border-top-right-radius: 7px;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .xp-close {
            background: #e04343;
            border: 1px solid white;
            color: white;
            border-radius: 3px;
            width: 21px;
            height: 21px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset -1px -1px 2px rgba(0,0,0,0.2);
        }

        .xp-content {
            padding: 20px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .xp-icon {
            font-size: 32px;
            margin-top: -5px;
        }

        .xp-message {
            font-size: 13px;
            color: #000;
        }

        .xp-footer {
            text-align: center;
            padding-bottom: 15px;
        }

        .xp-button {
            background: linear-gradient(to bottom, #f2f2f2, #ebebeb);
            border: 1px solid #707070;
            padding: 4px 25px;
            font-family: Tahoma, sans-serif;
            font-size: 13px;
            cursor: pointer;
            box-shadow: inset -1px -1px 2px rgba(0,0,0,0.1);
        }

        .xp-button:active {
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2);
            background: #e4e4e4;
        }
    </style>
</head>
<body>

    <div class="xp-window" id="mainWindow" style="top: 50%; left: 50%; transform: translate(-50%, -50%);">
        <div class="xp-titlebar">
            <span>Error de Red - Windows</span>
            <button class="xp-close">X</button>
        </div>
        <div class="xp-content">
            <div class="xp-icon">❌</div>
            <div class="xp-message">
                <strong>¡ALERTA CRÍTICA DE RED!</strong><br><br>
                Se ha detectado un acceso no autorizado a tu red local. Tu dirección IP y todos tus archivos privados están siendo expuestos públicamente.<br><br>
                Haga clic en "Aceptar" inmediatamente para intentar abortar la conexión.
            </div>
        </div>
        <div class="xp-footer">
            <button class="xp-button" onclick="triggerPrank()">Aceptar</button>
        </div>
    </div>

    <script>
        let isPrankActive = false;

        function triggerPrank() {
            if (isPrankActive) return;
            isPrankActive = true;

            // Intenta reproducir el sonido clásico de error (algunos navegadores lo permiten porque hubo interacción del usuario al hacer clic)
            let audio = new Audio('https://www.myinstants.com/media/sounds/windows-xp-error.mp3');
            audio.play().catch(e => console.log("Audio bloqueado"));

            const originalWindow = document.getElementById('mainWindow');
            const windowHTML = originalWindow.innerHTML;
            
            // Bucle para generar ventanas con un ligero retraso para dar el efecto de que la PC se está colgando
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    let newWindow = document.createElement('div');
                    newWindow.className = 'xp-window';
                    newWindow.innerHTML = windowHTML;
                    
                    // Coordenadas aleatorias en la pantalla
                    let randomTop = Math.floor(Math.random() * 80);
                    let randomLeft = Math.floor(Math.random() * 80);
                    
                    newWindow.style.top = randomTop + "vh";
                    newWindow.style.left = randomLeft + "vw";
                    newWindow.style.zIndex = 100 + i; 

                    // Cambiamos el mensaje de las ventanas clonadas para asustar más
                    newWindow.querySelector('.xp-message').innerHTML = "<strong>Fallo en el disco duro.</strong><br>Borrando System32...";
                    
                    document.body.appendChild(newWindow);
                    
                    // Volver a reproducir el sonido en algunas ventanas aleatorias
                    if (i % 5 === 0) {
                        let cascadeAudio = new Audio('https://www.myinstants.com/media/sounds/windows-xp-error.mp3');
                        cascadeAudio.play().catch(e => {});
                    }

                }, i * 150); // Aparece una nueva ventana cada 150 milisegundos
            }
        }

        // Hacer que el botón de la "X" también dispare la broma
        document.querySelector('.xp-close').addEventListener('click', triggerPrank);
    </script>

</body>
</html>
