<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Pizza 🍕</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-red: #ff2d55;
    --neon-orange: #ff6b1a;
    --neon-yellow: #ffd60a;
    --neon-cyan: #00d4ff;
    --neon-pink: #ff0a78;
    --bg-dark: #080810;
    --bg-card: rgba(255, 255, 255, 0.04);
    --bg-card-hover: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.08);
    --border-hot: rgba(255, 45, 85, 0.4);
    --text-primary: #f0f0f5;
    --text-muted: rgba(240,240,245,0.45);
    --glass: rgba(15, 15, 25, 0.85);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND GRID */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,45,85,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,45,85,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, rgba(255,45,85,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,8,16,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(255,45,85,0.5);
    animation: pulse-logo 3s ease-in-out infinite;
  }

  @keyframes pulse-logo {
    0%,100% { box-shadow: 0 0 20px rgba(255,45,85,0.5); }
    50% { box-shadow: 0 0 35px rgba(255,45,85,0.8), 0 0 60px rgba(255,107,26,0.3); }
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    line-height: 1;
    margin-top: 2px;
  }

  .header-right {
    display: flex; align-items: center; gap: 14px;
  }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,45,85,0.15);
    border: 1px solid rgba(255,45,85,0.4);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--neon-red);
    letter-spacing: 2px;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: var(--neon-red);
    border-radius: 50%;
    animation: blink 1.2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--neon-red);
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* MAIN LAYOUT */
  .app-layout {
    position: relative; z-index: 1;
    max-width: 1300px;
    margin: 0 auto;
    padding: 28px 24px 200px;
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto auto 1fr;
    gap: 20px;
    grid-template-areas:
      "search search"
      "stations sidebar"
      "stations sidebar";
  }

  /* SEARCH */
  .search-area { grid-area: search; }

  .search-wrapper {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px 16px 52px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    outline: none;
    transition: all 0.3s;
    letter-spacing: 0.5px;
  }

  .search-input::placeholder { color: var(--text-muted); }

  .search-input:focus {
    border-color: rgba(255,45,85,0.5);
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 0 3px rgba(255,45,85,0.1), 0 0 30px rgba(255,45,85,0.05);
  }

  .search-icon {
    position: absolute; left: 18px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 20px;
    pointer-events: none;
  }

  .search-count {
    position: absolute; right: 18px; top: 50%;
    transform: translateY(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* TABS */
  .tabs {
    display: flex; gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    width: fit-content;
    margin-bottom: 20px;
  }

  .tab {
    padding: 8px 20px;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
  }

  .tab.active {
    background: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
    color: white;
    box-shadow: 0 0 20px rgba(255,45,85,0.3);
  }

  /* STATION GRID */
  .stations-area { grid-area: stations; }

  .stations-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .station-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    animation: fadeInUp 0.4s ease both;
  }

  .station-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,45,85,0.06), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .station-card:hover {
    border-color: var(--border-hot);
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 12px 40px rgba(255,45,85,0.15);
  }

  .station-card:hover::before { opacity: 1; }

  .station-card.playing {
    border-color: rgba(255,45,85,0.6);
    background: rgba(255,45,85,0.08);
    box-shadow: 0 0 30px rgba(255,45,85,0.2), inset 0 0 30px rgba(255,45,85,0.05);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 14px;
  }

  .station-avatar {
    width: 56px; height: 56px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    font-weight: 900;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px;
    flex-shrink: 0;
    position: relative;
  }

  .card-actions {
    display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
  }

  .btn-fav {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.25s;
  }

  .btn-fav:hover, .btn-fav.active {
    border-color: var(--neon-yellow);
    color: var(--neon-yellow);
    background: rgba(255,214,10,0.1);
    box-shadow: 0 0 12px rgba(255,214,10,0.2);
  }

  .btn-fav.active { animation: star-pop 0.3s ease; }
  @keyframes star-pop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }

  .station-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .station-freq {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .station-genre {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .play-bar {
    display: flex; align-items: center; justify-content: space-between;
  }

  .btn-play-card {
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    color: white;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.25s;
  }

  .btn-play-card:hover {
    box-shadow: 0 0 20px rgba(255,45,85,0.5);
    transform: scale(1.04);
  }

  .station-card.playing .btn-play-card {
    background: linear-gradient(135deg, #111, #1a1a1a);
    border: 1px solid rgba(255,45,85,0.4);
  }

  .wave-bars {
    display: flex; align-items: center; gap: 3px;
    height: 20px;
  }

  .wave-bar {
    width: 3px;
    background: var(--neon-red);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }

  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.15s; }
  .wave-bar:nth-child(3) { animation-delay: 0.3s; }
  .wave-bar:nth-child(4) { animation-delay: 0.45s; }

  @keyframes wave {
    0%,100% { height: 4px; }
    50% { height: 18px; }
  }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .no-results-icon { font-size: 48px; margin-bottom: 16px; }
  .no-results-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    margin-bottom: 8px;
    color: var(--text-primary);
  }

  /* SIDEBAR */
  .sidebar { grid-area: sidebar; display: flex; flex-direction: column; gap: 16px; }

  .sidebar-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .sidebar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }

  .sidebar-title span { color: var(--neon-red); }

  /* STATS */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }

  .stat-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    background: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* FAVORITES SIDEBAR */
  .fav-list { display: flex; flex-direction: column; gap: 8px; }

  .fav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s;
  }

  .fav-item:hover {
    border-color: var(--border-hot);
    background: rgba(255,45,85,0.06);
  }

  .fav-avatar {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .fav-info { flex: 1; min-width: 0; }
  .fav-name {
    font-size: 13px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .fav-freq { font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace; }

  .fav-play-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .fav-play-btn:hover {
    border-color: var(--neon-red);
    color: var(--neon-red);
    background: rgba(255,45,85,0.1);
  }

  .empty-favs {
    text-align: center; padding: 20px;
    color: var(--text-muted); font-size: 13px;
  }
  .empty-favs-icon { font-size: 28px; margin-bottom: 8px; }

  /* ===== PLAYER ===== */
  #player {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    background: rgba(8,8,16,0.97);
    backdrop-filter: blur(30px);
    border-top: 1px solid var(--border);
    padding: 0;
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  #player.visible { transform: translateY(0); }

  .player-glow {
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-red), var(--neon-orange), var(--neon-yellow), var(--neon-red), transparent);
    background-size: 200% 100%;
    animation: slide-glow 3s linear infinite;
  }

  @keyframes slide-glow {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .player-inner {
    max-width: 1300px;
    margin: 0 auto;
    padding: 16px 24px;
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    align-items: center;
    gap: 24px;
  }

  /* STATION INFO */
  .player-info {
    display: flex; align-items: center; gap: 14px;
  }

  .player-avatar {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    font-weight: 900;
    flex-shrink: 0;
    position: relative;
    animation: rotate-slow 10s linear infinite paused;
  }

  .player-avatar.spinning { animation-play-state: running; }

  @keyframes rotate-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .player-avatar::after {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 17px;
    background: conic-gradient(var(--neon-red), var(--neon-orange), var(--neon-yellow), var(--neon-red));
    z-index: -1;
    animation: spin-border 2s linear infinite;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .player-avatar.spinning::after { opacity: 1; }
  @keyframes spin-border { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .player-station-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1.5px;
    line-height: 1.1;
  }

  .player-freq {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .player-status {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    margin-top: 4px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #666;
    transition: all 0.3s;
  }

  .status-dot.live {
    background: var(--neon-red);
    box-shadow: 0 0 8px var(--neon-red);
    animation: blink 1.2s infinite;
  }

  /* PLAYER CONTROLS */
  .player-controls {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }

  .controls-row {
    display: flex; align-items: center; gap: 10px;
  }

  .ctrl-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    transition: all 0.25s;
  }

  .ctrl-btn:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text-primary);
    background: rgba(255,255,255,0.05);
  }

  .ctrl-btn.active {
    border-color: var(--neon-red);
    color: var(--neon-red);
    background: rgba(255,45,85,0.1);
  }

  .btn-play-main {
    width: 52px; height: 52px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s;
    box-shadow: 0 0 25px rgba(255,45,85,0.4);
  }

  .btn-play-main:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px rgba(255,45,85,0.6);
  }

  /* VIZ CANVAS */
  .viz-row {
    width: 100%;
    display: flex; align-items: center; gap: 10px;
  }

  #vizCanvas {
    flex: 1;
    height: 36px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
  }

  .time-display {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* PLAYER RIGHT */
  .player-right {
    display: flex; flex-direction: column; gap: 12px; align-items: flex-end;
  }

  .volume-row {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    justify-content: flex-end;
  }

  .vol-icon {
    font-size: 16px;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .vol-icon:hover { color: var(--text-primary); }

  input[type="range"] {
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.1);
    outline: none;
    cursor: pointer;
    transition: background 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--neon-red);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,45,85,0.5);
    transition: transform 0.2s;
  }

  input[type="range"]:hover::-webkit-slider-thumb { transform: scale(1.3); }
  #volumeSlider { width: 100px; }

  .equalizer-row {
    display: flex; align-items: center; gap: 8px;
  }

  .eq-label {
    font-size: 10px; letter-spacing: 2px;
    color: var(--text-muted); text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }

  .eq-sliders {
    display: flex; align-items: flex-end; gap: 6px;
  }

  .eq-band {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }

  input[type="range"].eq-slider {
    -webkit-appearance: slider-vertical;
    width: 4px; height: 40px;
    writing-mode: vertical-lr;
    direction: rtl;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
  }

  input[type="range"].eq-slider::-webkit-slider-thumb {
    width: 10px; height: 10px;
  }

  .eq-freq {
    font-size: 8px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.5px;
  }

  .right-btns {
    display: flex; gap: 6px;
  }

  /* LOADING OVERLAY */
  .loading-overlay {
    position: absolute; inset: 0;
    background: rgba(8,8,16,0.85);
    display: flex; align-items: center; justify-content: center;
    border-radius: 14px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }

  .loading-overlay.active { opacity: 1; pointer-events: all; }

  .spinner {
    width: 24px; height: 24px;

  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast-container {
    position: fixed; bottom: 130px; right: 20px;
    z-index: 300;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }

  .toast {

  @keyframes toast-in { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

  /* SCROLLBAR */

// ===== STATE =====
let currentStation = null;
let isPlaying = false;
let isMuted = false;
let prevVolume = 80;
let favorites = JSON.parse(localStorage.getItem('rp_favs') || '[]');
let playedSet = new Set();
let startTime = null;
let totalSeconds = 0;

let srcNode = null;
let currentTab = 'all';
let isRecording = false;
let eqNodes = {};
let sleepTimer = null;
let isShuffle = false;
let sessionSeconds = 0;
let sessionInterval = null;

const audio = document.getElementById('audioEl');
const player = document.getElementById('player');

// ===== INIT =====
function init() {
  renderStations(stations);
  renderFavsSidebar();
  renderGenres();
  updateStats();
  setupEqualizer();
  startSessionTimer();
  setVolumeUI(80);
}

// ===== RENDER STATIONS =====
function renderStations(list) {
  const grid = document.getElementById('stationsGrid');
  const count = document.getElementById('sectionCount');
  count.textContent = `${list.length} emisora${list.length !== 1 ? 's' : ''}`;

  if (list.length === 0) {
    grid.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">📻</div>
        <div class="no-results-title">Sin resultados</div>
        <div style="color:var(--text-muted);font-size:14px">Intenta con otro término de búsqueda</div>
      </div>`;
    return;
  }

  grid.innerHTML = list.map((s, i) => {
    const isFav = favorites.includes(s.id);
    const isNowPlaying = currentStation && currentStation.id === s.id && isPlaying;
    return `
    <div class="station-card ${isNowPlaying ? 'playing' : ''}"
      id="card-${s.id}"
      onclick="playStation(${s.id})"
      style="animation-delay:${i * 0.05}s"
    >
      <div class="card-top">
        <div class="station-avatar" style="background:${s.bg}">
          ${s.emoji}
        </div>
        <div class="card-actions">
          <button class="btn-fav ${isFav ? 'active' : ''}"
            onclick="event.stopPropagation(); toggleFav(${s.id})"
            title="${isFav ? 'Quitar de favoritos' : 'Agregar a favoritos'}"
          >${isFav ? '⭐' : '☆'}</button>
        </div>
      </div>
      <div class="station-name">${s.name}</div>

            : `▶ ESCUCHAR`}
        </button>
        <span style="font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace">${s.description}</span>
      </div>
    </div>`;
  }).join('');
}

// ===== PLAY STATION =====
function playStation(id) {
  const s = stations.find(x => x.id === id);
  if (!s) return;

  if (currentStation && currentStation.id === id && isPlaying) {
    togglePlay();
    return;
  }

  currentStation = s;
  isPlaying = false;

  // Setup audio
  audio.src = s.url;
  audio.volume = document.getElementById('volumeSlider').value / 100;

  // Update player UI
  player.classList.add('visible');
  document.getElementById('playerName').textContent = s.name + ' ' + s.freq;
  document.getElementById('playerFreq').textContent = s.genre + ' · ' + s.description;
  document.getElementById('playerAvatar').textContent = s.emoji;
  document.getElementById('playerAvatar').style.background = s.bg;

  // Play
  setStatusLoading();
  audio.play().then(() => {
    isPlaying = true;
    setStatusLive();
    playedSet.add(id);
    startTime = Date.now();
    startTimeCounter();
    setupAnalyser();
    drawViz();
    updateStats();
  }).catch(err => {
    console.error(err);
    setStatusError();
    showToast('❌ No se pudo conectar a la emisora', '#ff3b30');
  });

  updatePlayerBtns();
  updateAllCards();
  updateFavPlayerBtn();
}

// ===== TOGGLE PLAY =====
function togglePlay() {
  if (!currentStation) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    setStatusPaused();
    stopTimeCounter();
  } else {
    setStatusLoading();
    audio.play().then(() => {
      isPlaying = true;
      setStatusLive();
      startTimeCounter();
    });
  }
  updatePlayerBtns();
  updateAllCards();
}

function updatePlayerBtns() {
  const btn = document.getElementById('btnPlayMain');
  const av = document.getElementById('playerAvatar');
  if (isPlaying) {
    btn.textContent = '⏸';
    av.classList.add('spinning');
  } else {
    btn.textContent = '▶';
    av.classList.remove('spinning');
  }
}

// ===== STATUS =====
function setStatusLive() {
  document.getElementById('statusDot').className = 'status-dot live';
  document.getElementById('statusText').textContent = 'EN VIVO';
  document.getElementById('statusText').style.color = 'var(--neon-red)';
}

function setStatusPaused() {
  document.getElementById('statusDot').className = 'status-dot';
  document.getElementById('statusDot').style.background = 'var(--neon-yellow)';
  document.getElementById('statusText').textContent = 'PAUSADO';
  document.getElementById('statusText').style.color = 'var(--neon-yellow)';
}

function setStatusLoading() {
  document.getElementById('statusDot').className = 'status-dot';
  document.getElementById('statusDot').style.background = 'var(--neon-cyan)';
  document.getElementById('statusText').textContent = 'CONECTANDO...';
  document.getElementById('statusText').style.color = 'var(--neon-cyan)';
}

function setStatusError() {
  document.getElementById('statusDot').className = 'status-dot';
  document.getElementById('statusDot').style.background = '#ff9f0a';
  document.getElementById('statusText').textContent = 'ERROR';
  document.getElementById('statusText').style.color = '#ff9f0a';
}

// ===== NAV CONTROLS =====
function getFilteredList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return stations.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.freq.toLowerCase().includes(q) ||
    s.genre.toLowerCase().includes(q)
  );
}

function prevStation() {
  if (!currentStation) return;
  const list = getFilteredList();
  const idx = list.findIndex(s => s.id === currentStation.id);
  const prev = list[(idx - 1 + list.length) % list.length];
  playStation(prev.id);
}

function nextStation() {
  if (!currentStation) return;
  const list = getFilteredList();
  const idx = list.findIndex(s => s.id === currentStation.id);
  const next = list[(idx + 1) % list.length];
  playStation(next.id);
}

function shuffleStation() {
  isShuffle = !isShuffle;
  document.getElementById('btnShuffle').classList.toggle('active', isShuffle);
  showToast(isShuffle ? '🔀 Modo aleatorio ON' : '🔀 Modo aleatorio OFF', isShuffle ? 'var(--neon-cyan)' : 'var(--text-muted)');
  if (isShuffle) {
    const list = getFilteredList().filter(s => !currentStation || s.id !== currentStation.id);
    if (list.length > 0) playStation(list[Math.floor(Math.random() * list.length)].id);
  }
}

// ===== VOLUME =====
function setVolume(val) {
  audio.volume = val / 100;
  setVolumeUI(val);
}

function setVolumeUI(val) {
  document.getElementById('volValue').textContent = val;
  const icon = document.getElementById('volIcon');
  if (val == 0) icon.textContent = '🔇';
  else if (val < 40) icon.textContent = '🔉';
  else icon.textContent = '🔊';
  // Update slider color
  const pct = val;
  document.getElementById('volumeSlider').style.background =
    `linear-gradient(to right, var(--neon-red) ${pct}%, rgba(255,255,255,0.1) ${pct}%)`;
}

function toggleMute() {
  isMuted = !isMuted;
  if (isMuted) {
    prevVolume = document.getElementById('volumeSlider').value;
    audio.volume = 0;
    document.getElementById('volumeSlider').value = 0;
    setVolumeUI(0);
  } else {
    audio.volume = prevVolume / 100;
    document.getElementById('volumeSlider').value = prevVolume;
    setVolumeUI(prevVolume);
  }
}

// ===== FAVORITES =====
function toggleFav(id) {
  const idx = favorites.indexOf(id);
  const s = stations.find(x => x.id === id);
  if (idx === -1) {
    favorites.push(id);
    showToast(`⭐ ${s.name} añadida a favoritos`, 'var(--neon-yellow)');
  } else {
    favorites.splice(idx, 1);
    showToast(`☆ ${s.name} quitada de favoritos`, 'var(--text-muted)');
  }
  localStorage.setItem('rp_favs', JSON.stringify(favorites));
  updateStats();
  renderFavsSidebar();
  updateAllCards();
  updateFavPlayerBtn();
  if (currentTab === 'favs') renderCurrentTab();
}

function favCurrentStation() {
  if (!currentStation) return;
  toggleFav(currentStation.id);
}

function updateFavPlayerBtn() {
  if (!currentStation) return;
  const btn = document.getElementById('btnFavPlayer');
  const isFav = favorites.includes(currentStation.id);
  btn.textContent = isFav ? '♥' : '♡';
  btn.classList.toggle('active', isFav);
}

function renderFavsSidebar() {
  const container = document.getElementById('favList');
  const favStations = stations.filter(s => favorites.includes(s.id));
  if (favStations.length === 0) {
    container.innerHTML = `<div class="empty-favs"><div class="empty-favs-icon">🌟</div><div>Aún no tienes favoritos.<br>Toca ★ en una emisora.</div></div>`;
    return;
  }
  container.innerHTML = favStations.map(s => `
    <div class="fav-item" onclick="playStation(${s.id})">
      <div class="fav-avatar" style="background:${s.bg}">${s.emoji}</div>
      <div class="fav-info">
        <div class="fav-name">${s.name}</div>
        <div class="fav-freq">${s.freq}</div>
      </div>
      <button class="fav-play-btn" onclick="event.stopPropagation();playStation(${s.id})">▶</button>
    </div>
  `).join('');
}

  const genres = [...new Set(stations.map(s => s.genre))];

  container.innerHTML = genres.map(g => {
    const s = stations.find(x => x.genre === g);
    return `
      <button onclick="filterByGenre('${g}')" style="

        background:${s.color}15;

        letter-spacing:1.5px;

      " onmouseover="this.style.background='${s.color}30'" onmouseout="this.style.background='${s.color}15'">

  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = stations.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.freq.toLowerCase().includes(q) ||
    s.genre.toLowerCase().includes(q) ||
    s.description.toLowerCase().includes(q)
  );
  if (currentTab === 'favs') list = list.filter(s => favorites.includes(s.id));
  document.getElementById('searchCount').textContent = q ? `${list.length} resultado${list.length !== 1 ? 's' : ''}` : '';
  renderStations(list);
}

// ===== TABS =====
document.getElementById('tabsBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  currentTab = btn.dataset.tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sectionTitle').textContent = currentTab === 'favs' ? 'FAVORITOS' : 'EMISORAS';
  renderCurrentTab();
});

function renderCurrentTab() {
  let list = stations;
  if (currentTab === 'favs') list = stations.filter(s => favorites.includes(s.id));
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (q) list = list.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.freq.toLowerCase().includes(q) ||
    s.genre.toLowerCase().includes(q)
  );
  renderStations(list);
}

// ===== STATS =====
function updateStats() {
  document.getElementById('statFavs').textContent = favorites.length;
  document.getElementById('statPlayed').textContent = playedSet.size;
}

// ===== TIMER =====
function startTimeCounter() {
  if (timeInterval) clearInterval(timeInterval);
  startTime = Date.now();
  timeInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000) + totalSeconds;
    const m = Math.floor(s / 60).toString().padStart(2, '0');
    const sec = (s % 60).toString().padStart(2, '0');
    document.getElementById('timeDisplay').textContent = m + ':' + sec;
  }, 1000);
}

function stopTimeCounter() {
  if (startTime) totalSeconds += Math.floor((Date.now() - startTime) / 1000);
  startTime = null;
  clearInterval(timeInterval);
}

function startSessionTimer() {
  sessionInterval = setInterval(() => {
    if (isPlaying) {
      sessionSeconds++;
      const m = Math.floor(sessionSeconds / 60);
      document.getElementById('statTime').textContent = m < 60 ? m + 'm' : Math.floor(m/60) + 'h';
    }
  }, 1000);
}

// ===== VISUALIZER =====
function setupAnalyser() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (srcNode) srcNode.disconnect();
  srcNode = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;

  // Reconnect EQ
  let chain = srcNode;
  Object.values(eqNodes).forEach(node => {
    chain.connect(node);
    chain = node;
  });
  chain.connect(analyser);
  analyser.connect(audioCtx.destination);

  if (animFrame) cancelAnimationFrame(animFrame);
  drawViz();
}

function drawViz() {
  const canvas = document.getElementById('vizCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;

  function draw() {
    animFrame = requestAnimationFrame(draw);
    ctx.clearRect(0, 0, W, H);

    if (!analyser || !isPlaying) {
      // Idle animation
      const t = Date.now() / 1000;
      ctx.fillStyle = 'rgba(255,45,85,0.15)';
      for (let i = 0; i < 32; i++) {
        const x = (i / 32) * W;
        const h = 4 + Math.sin(t * 2 + i * 0.5) * 4;
        ctx.fillRect(x, (H - h) / 2, (W / 32) - 1, h);
      }
      return;
    }

    const buf = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(buf);
    const bars = 64;
    const bw = W / bars - 1;

    for (let i = 0; i < bars; i++) {
      const val = buf[i] / 255;
      const h = val * H;
      const hue = 0 + val * 40; // red to orange
      ctx.fillStyle = `hsla(${hue},100%,${50 + val * 20}%,${0.6 + val * 0.4})`;
      ctx.fillRect(i * (bw + 1), H - h, bw, h);

      // Reflection
      ctx.fillStyle = `hsla(${hue},100%,50%,0.1)`;
      ctx.fillRect(i * (bw + 1), H, bw, h * 0.3);
    }
  }
  draw();
}

// Start idle viz immediately
drawViz();

// ===== EQUALIZER =====
function setupEqualizer() {
  const bands = [
    { freq: 60, label: '60' },
    { freq: 250, label: '250' },
    { freq: 1000, label: '1K' },
    { freq: 4000, label: '4K' },
    { freq: 16000, label: '16K' }
  ];

  const container = document.getElementById('eqSliders');
  container.innerHTML = bands.map((b, i) => `
    <div class="eq-band">
      <input type="range" class="eq-slider" min="-12" max="12" value="0"
        oninput="setEQ(${b.freq}, this.value)"
        title="${b.label} Hz"
        style="writing-mode:vertical-lr;direction:rtl;-webkit-appearance:slider-vertical;"
      >
      <span class="eq-freq">${b.label}</span>
    </div>
  `).join('');
}

function setEQ(freq, gain) {
  if (!audioCtx) return;
  if (!eqNodes[freq]) {
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'peaking';
    filter.frequency.value = freq;
    filter.Q.value = 1;
    eqNodes[freq] = filter;
  }
  eqNodes[freq].gain.value = parseFloat(gain);
}

// ===== RECORD =====
function toggleRecord() {
  isRecording = !isRecording;
  const btn = document.getElementById('btnRecord');
  btn.classList.toggle('active', isRecording);
  btn.style.color = isRecording ? '#ff3b30' : '';
  showToast(isRecording ? '⏺ Grabación iniciada (simulada)' : '⏹ Grabación detenida', isRecording ? '#ff3b30' : 'var(--text-muted)');
}

// ===== SLEEP TIMER =====
let sleepSeconds = 0;
const sleepOptions = [0, 15, 30, 60];
let sleepIdx = 0;

function toggleSleep() {
  sleepIdx = (sleepIdx + 1) % sleepOptions.length;
  const mins = sleepOptions[sleepIdx];
  if (sleepTimer) clearTimeout(sleepTimer);

  const btn = document.getElementById('btnSleep');
  if (mins === 0) {
    btn.classList.remove('active');
    btn.title = 'Temporizador';
    showToast('😴 Temporizador desactivado', 'var(--text-muted)');
  } else {
    btn.classList.add('active');
    btn.title = `Apagar en ${mins}min`;
    showToast(`😴 Apagando en ${mins} minutos`, 'var(--neon-cyan)');
    sleepTimer = setTimeout(() => {
      audio.pause();
      isPlaying = false;
      updatePlayerBtns();
      setStatusPaused();
      updateAllCards();
      showToast('😴 Radio apagada automáticamente', 'var(--neon-yellow)');
    }, mins * 60 * 1000);
  }
}

// ===== SHARE =====
function shareStation() {
  if (!currentStation) {
    showToast('Selecciona una emisora primero', 'var(--text-muted)');
    return;
  }
  const text = `🍕 Escuchando ${currentStation.name} ${currentStation.freq} en Radio Pizza!`;
  if (navigator.share) {
    navigator.share({ title: 'Radio Pizza', text });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      showToast('📋 Copiado al portapapeles', 'var(--neon-cyan)');
    });
  }
}

// ===== UPDATE ALL CARDS =====
function updateAllCards() {
  stations.forEach(s => {
    const card = document.getElementById('card-' + s.id);
    if (!card) return;
    const isNow = currentStation && currentStation.id === s.id && isPlaying;
    card.classList.toggle('playing', isNow);
    const btn = card.querySelector('.btn-play-card');
    if (btn) {
      btn.innerHTML = isNow
        ? `<div class="wave-bars">${[1,2,3,4].map(()=>'<div class="wave-bar"></div>').join('')}</div> EN VIVO`
        : `▶ ESCUCHAR`;
    }
  });
}

// ===== TOAST =====
function showToast(msg, color = 'var(--text-primary)') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.borderColor = color === 'var(--text-primary)' ? 'var(--border)' : color + '44';
  el.innerHTML = `<span style="color:${color}">${msg}</span>`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

// ===== AUDIO EVENTS =====
audio.addEventListener('error', () => {
  isPlaying = false;
  setStatusError();
  updatePlayerBtns();
  updateAllCards();
  showToast('⚠️ Error al reproducir. Verifica tu conexión.', '#ff9f0a');
});

audio.addEventListener('waiting', () => {
  setStatusLoading();
});

audio.addEventListener('playing', () => {
  setStatusLive();
});

// ===== START =====
init();
</script>
