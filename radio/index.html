<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Pizza 🍕</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="user-info">
            <span id="clock">00:00:00</span>
            <span id="weather">📍 Cargando...</span>
        </div>

        <h1>🍕 Radio Pizza</h1>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Busca tu emisora favorita...">
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="setTab('all')">Todas las Emisoras</button>
        <button class="tab-btn" onclick="setTab('fav')">Mis Favoritas <i class="fas fa-heart"></i></button>
    </div>

    <main class="grid-container" id="station-list">
    </main>

    <audio id="audioElement" preload="none"></audio>

    <div class="player-container" id="playerUI">
        <div class="player-info">
            <div class="vinyl-record" id="vinyl"></div>
            <div>
                <div class="player-station-name" id="currentStationName">Selecciona una emisora</div>
                <div class="visualizer" id="visualizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
            </div>
        </div>

        <div class="player-controls">
            <button class="control-btn" onclick="stopAudio()" title="Detener"><i class="fas fa-stop"></i></button>
            <button class="control-btn" onclick="prevStation()" title="Anterior"><i class="fas fa-step-backward"></i></button>
            <button class="control-btn play-pause-btn" id="playPauseBtn" onclick="togglePlayPause()"><i class="fas fa-play-circle"></i></button>
            <button class="control-btn" onclick="nextStation()" title="Siguiente"><i class="fas fa-step-forward"></i></button>
            <button class="control-btn" id="playerFavBtn" onclick="toggleFavoriteFromPlayer()" title="Favoritos"><i class="far fa-heart"></i></button>
        </div>

        <div class="volume-container">
            <i class="fas fa-volume-down" id="muteIcon" style="cursor: pointer;" onclick="toggleMute()"></i>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.05" value="0.8" onchange="setVolume(this.value)" oninput="setVolume(this.value)">
            <i class="fas fa-volume-up"></i>
        </div>
    </div>

    <!-- Contenedor de notificaciones emergentes -->
    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
