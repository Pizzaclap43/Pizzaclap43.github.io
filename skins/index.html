<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="icon" type="image/png" href="https://cdn.classicube.net/face/pizzaclap43.png">

    <!-- SEO & Descripción -->
    <meta name="description" content="Descarga skins de jugadores de ClassiCube en formato PNG. Busca por nombre de usuario y descarga la skin directamente desde el servidor oficial de ClassiCube.">
    <meta name="keywords" content="ClassiCube, skins, descargar skin ClassiCube, ClassiCube PNG, skins Minecraft clásico, jugadores ClassiCube, skin download, classicube.net skins">
    <meta name="author" content="Servidor de Skins ClassiCube">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (para compartir en redes) -->
    <meta property="og:title" content="Skins de ClassiCube - Descargas">
    <meta property="og:description" content="Busca y descarga skins de jugadores de ClassiCube en PNG. Comunidad hispanohablante.">
    <meta property="og:type" content="website">

    <title>Skins de ClassiCube - Descargas</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #ffcc00;
            --button-hover: #e6b800;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        /* ── Barra de búsqueda ── */
        .search-wrapper {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--bg-color);
            padding: 12px 0;
        }

        #search-input {
            flex: 1;
            min-width: 0;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid #333;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1em;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            /* táctil: evita zoom en iOS al enfocar el input */
            font-size: 16px;
        }

        #search-input:focus {
            border-color: var(--accent-color);
        }

        #search-input::placeholder {
            color: #777;
        }

        #search-btn {
            padding: 12px 22px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-color);
            color: #000;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s;
            /* área táctil mínima recomendada */
            min-height: 48px;
            min-width: 48px;
            touch-action: manipulation;
        }

        #search-btn:hover {
            background-color: var(--button-hover);
        }

        /* Resultado dinámico de búsqueda */
        #search-result-section {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
        }

        #search-result-section .section-label {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 10px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        #not-found-msg {
            display: none;
            color: #ff6b6b;
            background: #2a1a1a;
            border: 1px solid #ff6b6b44;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.95em;
        }

        /* ── Grid original ── */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .skin-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid #333;
        }

        .skin-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        /* Resaltado de coincidencia en búsqueda */
        .skin-card.match-highlight {
            border-color: var(--accent-color);
            box-shadow: 0 0 12px #ffcc0044;
        }

        .skin-preview {
            width: 128px;
            height: 128px;
            image-rendering: pixelated;
            margin-bottom: 15px;
            background-color: #2a2a2a;
            border-radius: 5px;
            object-fit: contain;
            /* táctil: evita comportamiento extraño al mantener pulsado */
            -webkit-user-drag: none;
            pointer-events: none;
        }

        .username {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .download-btn {
            display: block;
            background-color: var(--accent-color);
            color: #000;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
            transition: background 0.2s;
            text-align: center;
            line-height: normal;
            touch-action: manipulation;
        }

        .download-btn:hover {
            background-color: var(--button-hover);
        }

        footer {
            margin-top: 50px;
            font-size: 0.8em;
            color: #777;
        }

        /* ── Responsive táctil ── */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 1.4em;
                text-align: center;
            }

            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 14px;
            }

            .skin-preview {
                width: 96px;
                height: 96px;
            }

            .search-wrapper {
                flex-direction: column;
            }

            #search-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <h1>Descarga de Skins ClassiCube</h1>

    <!-- Barra de búsqueda -->
    <div class="search-wrapper">
        <input
            type="search"
            id="search-input"
            placeholder="Buscar jugador de ClassiCube..."
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            enterkeyhint="search"
        >
        <button id="search-btn" aria-label="Buscar">🔍 Buscar</button>
    </div>

    <!-- Zona de resultados de búsqueda -->
    <div id="search-result-section">
        <div id="not-found-msg">
            ⚠️ No se encontró ese jugador en la lista. Puedes intentar descargarlo directamente:
            <span id="direct-link-wrapper"></span>
        </div>
    </div>

    <div class="grid-container" id="skin-grid">
        <!-- Las skins se generan aquí -->
    </div>

    <footer>
        <p>Servidor de Skins - Realizado para la comunidad de ClassiCube</p>
    </footer>

    <script>
        const players = [
            "pizzaclap43", "CatMeow98", "AndresDMC", "ElmichiYT", 
            "RIP_SAURIO", "jose_120", "azul29", "37equiel", 
            "StevenCA.", "PAdrian1519", "Solidcat2", "Lucas_M.G.", 
            "LRTER_", "Sans.exe", "Vhs.Sans", "Josue2209", "magma.mp4",
            "tGreysVT", "_OmegaBananas_", "impresson", "emicics",
            "Panda", "Mrcoli5", "Orange_scp", "venuccya2", "moe_hola",
            "CatUser90", "Dark_Cat", "Cat_smiler", "CatDummy98", "Mr_Cat875",
            "Trump", "Maduro", "icantellyou", "CutieQueen", "Mr_Peru",
            "genotrax", "Sintaxis", "Zee777", "yisusxd", "mel120", "XiaroMC",
            "AndrewPH", "MisterSheeple", "Toby", "astridgx_1", "jorge_srm",
            "Blackmen147", "AndroidPlayer500", "Nico1Monte", "tronlight255",
            "SoyArgentino.MP5", "Lavacraft239", "Pacho", "ElmichiYTII", "Lavacraft239",
            "elmejorcausa77", "samu0678911", "123DontMessWitMe", "UnknownShadow200",
            "Goodly", "ilovenuggets123", "Waxtz", "jumex", "drogadicto",
            "18", "cum", "trans", "Dark_smiler", "ZuaredPT", "Isrre", "BadDoneandSmooth",
            "Omenaso", "Lightmen2019", "xennoww", "jo.oj.admare", "omenasito",
            "zolidkore7", "Matthew132", "shadow5478", "Sant_Zue",
            "SakyEspanol", "Android_c10", "Pringles2244", "TheErkaswyMC",
            "MarbleCat53666", "ElNingaProGamer", "Undertake", "roroblox1003"
        ];

        const grid = document.getElementById('skin-grid');

        // ── Generar tarjetas ──
        players.forEach(player => {
            const skinUrl = `https://cdn.classicube.net/skin/${player}.png`;
            
            const card = document.createElement('div');
            card.className = 'skin-card';
            card.dataset.player = player.toLowerCase();
            
            card.innerHTML = `
                <img src="${skinUrl}" alt="${player}" class="skin-preview" onerror="this.src='https://www.classicube.net/static/img/skin_placeholder.png'">
                <span class="username">${player}</span>
                <a href="${skinUrl}" download="${player}_skin.png" target="_blank" class="download-btn">Descargar PNG</a>
            `;
            
            grid.appendChild(card);
        });

        // ── Lógica de búsqueda ──
        const searchInput  = document.getElementById('search-input');
        const searchBtn    = document.getElementById('search-btn');
        const notFoundMsg  = document.getElementById('not-found-msg');
        const directLink   = document.getElementById('direct-link-wrapper');
        const allCards     = () => document.querySelectorAll('.skin-card');

        function doSearch() {
            const query = searchInput.value.trim().toLowerCase();

            // Limpiar estado anterior
            notFoundMsg.style.display = 'none';
            allCards().forEach(c => {
                c.classList.remove('match-highlight');
                c.style.display = '';
            });

            if (!query) return;

            let found = null;

            allCards().forEach(card => {
                const name = card.dataset.player;
                // Coincidencia exacta preferida; fallback a "contiene"
                if (name === query) {
                    found = card;
                } else if (!found && name.includes(query)) {
                    found = card;
                }
            });

            if (found) {
                found.classList.add('match-highlight');
                found.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                // No está en la lista → ofrecer enlace directo a ClassiCube CDN
                const rawName   = searchInput.value.trim();
                const skinUrl   = `https://cdn.classicube.net/skin/${encodeURIComponent(rawName)}.png`;
                directLink.innerHTML = `<a href="${skinUrl}" target="_blank" style="color:var(--accent-color);margin-left:6px;">${rawName}_skin.png</a>`;
                notFoundMsg.style.display = 'block';
            }
        }

        searchBtn.addEventListener('click', doSearch);

        searchInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch();
        });

        // Búsqueda en tiempo real (al escribir)
        searchInput.addEventListener('input', () => {
            if (searchInput.value.trim() === '') {
                notFoundMsg.style.display = 'none';
                allCards().forEach(c => {
                    c.classList.remove('match-highlight');
                    c.style.display = '';
                });
            }
        });
    </script>

</body>
</html>
