<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portal de Video Streaming</title>
    <style>
        /* --- ESTILOS CSS PRINCIPALES --- */
        
        /* Variables para el diseño "llamativo" (Tema Oscuro Premium) */
        :root {
            --bg-color: #121212; /* Fondo casi negro */
            --card-bg: #1e1e1e; /* Fondo de tarjetas un poco más claro */
            --accent-color: #00d1b2; /* Turquesa vibrante para toques llamativos */
            --text-main: #eeeeee; /* Texto principal casi blanco */
            --text-sub: #aaaaaa; /* Texto secundario gris claro */
            --font-family: 'Open Sans', sans-serif;
        }

        /* Importar fuente moderna de Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap');

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Cabecera (Header) */
        header {
            background-color: #000;
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header h1 span {
            color: var(--accent-color);
        }

        /* Contenido Principal (Main) */
        main {
            flex-grow: 1;
            padding: 40px 20px;
        }

        /* Grícula de Videos (Grid) - Hace la página intuitiva y responsiva */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); /* Se ajusta solo */
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Tarjeta de Video Individual (Card) */
        .video-item {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .video-item:hover {
            transform: translateY(-5px); /* Efecto al pasar el mouse */
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
        }

        /* Contenedor responsivo para el Iframe */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Mantiene la relación de aspecto 16:9 */
            height: 0;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Detalles debajo del video */
        .video-details {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .video-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #fff;
        }

        .video-meta {
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        /* Pie de página (Footer) */
        footer {
            background-color: #000;
            color: var(--text-sub);
            text-align: center;
            padding: 20px 0;
            margin-top: auto;
            border-top: 1px solid #333;
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>MI PORTAL <span>STREAMING</span></h1>
    </header>

    <main>
        <div class="video-grid">

            <div class="video-item">
                <div class="video-wrapper">
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/1mHwHwSfYbc?si=X6kcuJdpn7j_9y2F" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>
                <div class="video-details">
                    <h2 class="video-title">Video Destacado 1</h2>
                    <p class="video-meta">Héctor Fernández - [Haikyuu!!]</p>
                </div>
            </div>

            <div class="video-item">
                <div class="video-wrapper">
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/Qr61waJ6AZg?si=c7VA6CuTfmwJFAEd" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>
                <div class="video-details">
                    <h2 class="video-title">Video Destacado 2</h2>
                    <p class="video-meta">Héctor Fernández - [Otro Título]</p>
                </div>
            </div>

            <div class="video-item">
                <div class="video-wrapper">
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/htd8gKYYEFM?si=glgoM7bz7njnoD6M" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>
                <div class="video-details">
                    <h2 class="video-title">Video Destacado 3</h2>
                    <p class="video-meta">Héctor Fernández - [Tercer Título]</p>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2023 Tu Portal de Video. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
