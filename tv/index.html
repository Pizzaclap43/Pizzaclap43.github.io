<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍕 Pizza TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="main-view">
            <header>
                <h1>🍕 Pizza TV</h1>
                <input type="text" id="search-bar" placeholder="Buscar canal...">
            </header>

            <main>
                <section id="favorites-section" style="display: none;">
                    <h2>⭐ Mis Favoritos</h2>
                    <div id="favorites-grid" class="channel-grid"></div>
                    <hr>
                </section>

                <section id="all-channels-section">
                    <h2>📺 Todos los Canales</h2>
                    <div id="channels-grid" class="channel-grid"></div>
                </section>
            </main>
        </div>

        <div id="player-view" style="display: none;">
            <div class="player-header">
                <button id="back-btn">⬅ Regresar</button>
                <h2 id="now-playing">Reproduciendo...</h2>
                <!-- Selector de calidad agregado aquí -->
                <select id="quality-selector" style="display: none; padding: 5px; margin-left: auto; background: #333; color: white; border-radius: 5px; border: 1px solid #555;">
                    <option value="-1">Automático</option>
                </select>
            </div>
            
            <div class="video-container">
                <video id="tv-player" controls autoplay></video>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
