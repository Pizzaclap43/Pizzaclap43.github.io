
<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: transparent; color: var(--color-text-primary); }

  #game-container {
    max-width: 680px;
    margin: 0 auto;
    padding: 1rem 0;
  }

  .header {
    background: linear-gradient(135deg, #CF142B 0%, #CF142B 33%, #003DA5 33%, #003DA5 66%, #F5D800 66%);
    border-radius: var(--border-radius-lg);
    padding: 1.5rem;
    text-align: center;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.45);
    border-radius: var(--border-radius-lg);
  }
  .header-content { position: relative; z-index: 1; }
  .header h1 { font-size: 22px; font-weight: 500; color: #fff; margin-bottom: 4px; }
  .header p { font-size: 13px; color: rgba(255,255,255,0.85); }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px;
    text-align: center;
  }
  .stat-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .stat-val { font-size: 18px; font-weight: 500; }
  .stat-val.red { color: #CF142B; }
  .stat-val.blue { color: #003DA5; }
  .stat-val.yellow { color: #c8a800; }
  .stat-val.green { color: #1D9E75; }

  .scene-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .scene-location {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .scene-location i { font-size: 14px; }
  .scene-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--color-text-primary);
    margin-bottom: 1rem;
  }
  .scene-img-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .scene-tag {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    border: 0.5px solid var(--color-border-tertiary);
  }

  .choices-title {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice-btn {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    font-size: 14px;
    color: var(--color-text-primary);
    transition: background 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .choice-btn:hover { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
  .choice-btn:active { transform: scale(0.99); }
  .choice-icon { font-size: 16px; flex-shrink: 0; }

  .inventory {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-lg);
    padding: 1rem;
    margin-top: 1rem;
  }
  .inv-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; color: var(--color-text-secondary); }
  .inv-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .inv-item {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-primary);
  }

  .log {
    margin-top: 1rem;
    max-height: 120px;
    overflow-y: auto;
    border-top: 0.5px solid var(--color-border-tertiary);
    padding-top: 10px;
  }
  .log-entry {
    font-size: 12px;
    color: var(--color-text-secondary);
    padding: 3px 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .log-entry:last-child { border-bottom: none; }

  .char-select {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 1rem;
  }
  .char-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    padding: 1rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: center;
  }
  .char-card:hover { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
  .char-avatar { font-size: 36px; margin-bottom: 8px; }
  .char-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .char-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
  .char-stats { display: flex; justify-content: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .char-stat { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--color-background-secondary); color: var(--color-text-secondary); }

  .modal-overlay {
    min-height: 300px;
    background: rgba(0,0,0,0.45);
    border-radius: var(--border-radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    margin: 1rem 0;
  }
  .modal-box {
    background: var(--color-background-primary);
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    padding: 1.5rem;
    width: 100%;
    max-width: 460px;
    text-align: center;
  }
  .modal-box h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .modal-box p { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 1rem; }
  .btn-primary {
    background: #CF142B;
    color: #fff;
    border: none;
    border-radius: var(--border-radius-md);
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    font-family: var(--font-sans);
  }
  .btn-primary:hover { background: #a5102a; }

  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-right: 4px; }
  .badge-red { background: #FAECE7; color: #993C1D; }
  .badge-blue { background: #E6F1FB; color: #185FA5; }
  .badge-yellow { background: #FAEEDA; color: #854F0B; }
</style>
</head>

    icon:'ti-shield',
    tags:['Cultura','Zulia','Justicia'],
    text:`Organizas una asamblea con los palafiteros. Con tu labia y astucia, redactas una carta dirigida al Ministerio de Ecosocialismo y logras que periodistas de Globovisión y VPI TV cubran la historia. La comunidad canta una gaita zuliana en tu honor — "El Palafito No Se Vende" — y el empresario retira su proyecto. La abuela de la comunidad, Doña Sixta, te da un collar de pepas del llano como agradecimiento. "Tú tienes corazón venezolano, sea de donde seas", te dice. Y con ese corazón venezolano, tu próxima aventura te espera.`,
    choices:[
      {text:'Continuar la aventura hacia la Gran Sabana ↗', icon:'ti-map-2', next:'mision_salto_angel', effect:{bondad:+2}},
      {text:'Volver al inicio y explorar otra ruta', icon:'ti-refresh', next:'mercado_chacao', effect:{}}
    ]
  }
];

const SCENE_MAP = {};
SCENARIOS.forEach(s => SCENE_MAP[s.id] = s);

let state = {
  phase: 'intro',
  char: null,
  currentScene: 'mercado_chacao',
  stats: {hambre:60, plata:50, bondad:5, fuerza:5, astucia:5, labia:5, resistencia:5},
  inventory: [],
  log: []
};

function getScene(id){ return SCENE_MAP[id] || SCENE_MAP['mercado_chacao']; }

function applyEffect(effect){
  const s = state.stats;
  if(effect.hambre) s.hambre = Math.min(100, Math.max(0, s.hambre + effect.hambre));
  if(effect.plata) s.plata = Math.max(0, s.plata + effect.plata);
  if(effect.bondad) s.bondad = (s.bondad||0) + effect.bondad;
  if(effect.fuerza) s.fuerza = (s.fuerza||0) + effect.fuerza;
  if(effect.astucia) s.astucia = (s.astucia||0) + effect.astucia;
  if(effect.labia) s.labia = (s.labia||0) + effect.labia;
  if(effect.resistencia) s.resistencia = (s.resistencia||0) + effect.resistencia;
  if(effect.inventario) state.inventory.push(...effect.inventario.split(',').map(x=>x.trim()));
}

function render(){
  const root = document.getElementById('root');
  if(state.phase === 'intro') root.innerHTML = renderIntro();
  else if(state.phase === 'charselect') root.innerHTML = renderCharSelect();
  else root.innerHTML = renderGame();
  bindEvents();
}

function renderIntro(){
  return `
  <div class="modal-overlay">
    <div class="modal-box">
      <div style="font-size:48px;margin-bottom:12px;">🇻🇪</div>
      <h2>Venezuela: La Gran Aventura</h2>
      <p>Un RPG de texto inmersivo ambientado en la Venezuela más auténtica. Cultura, gastronomía, música, naturaleza y mucha pana. Tú decides el camino, mijo.</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:1rem;">
        <span class="badge badge-red">Gastronomía venezolana</span>
        <span class="badge badge-blue">Cultura y música</span>
        <span class="badge badge-yellow">Naturaleza & aventura</span>
      </div>
      <button class="btn-primary" data-action="start-charselect">¡Dale que vamos! →</button>
    </div>
  </div>`;
}

function renderCharSelect(){
  const chars = CHARS.map(c => `
    <div class="char-card" data-action="select-char" data-char="${c.id}">
      <div class="char-avatar">${c.avatar}</div>
      <div class="char-name">${c.name}</div>
      <div class="char-desc">${c.desc}</div>
      <div class="char-stats">
        <span class="char-stat">💪 ${c.stats.fuerza}</span>
        <span class="char-stat">🧠 ${c.stats.astucia}</span>
        <span class="char-stat">🗣️ ${c.stats.labia}</span>
        <span class="char-stat">🏃 ${c.stats.resistencia}</span>
      </div>
    </div>
  `).join('');
  return `
  <div class="scene-card">
    <div style="font-size:15px;font-weight:500;margin-bottom:6px;">Elige tu personaje</div>
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem;">Cada uno tiene sus fortalezas y su propia Venezuela.</div>
    <div class="char-select">${chars}</div>
  </div>`;
}

function renderGame(){
  const scene = getScene(state.currentScene);
  const c = state.char;
  const s = state.stats;

  const hambreColor = s.hambre > 60 ? 'green' : s.hambre > 30 ? 'yellow' : 'red';
  const plataColor = s.plata > 30 ? 'blue' : 'red';

  const statsBar = `
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Personaje</div>
      <div class="stat-val" style="font-size:13px;">${c.avatar} ${c.name.split(' ')[1]||c.name.split(' ')[0]}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hambre</div>
      <div class="stat-val ${hambreColor}">${Math.round(s.hambre)}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Plata (Bs.)</div>
      <div class="stat-val ${plataColor}">${Math.round(s.plata)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Bondad</div>
      <div class="stat-val blue">${Math.round(s.bondad)}</div>
    </div>
  </div>`;

  const tags = scene.tags.map(t=>`<span class="scene-tag">${t}</span>`).join('');
  const choices = scene.choices.map((ch,i)=>`
    <button class="choice-btn" data-action="choice" data-idx="${i}">
      <i class="ti ${ch.icon} choice-icon" aria-hidden="true"></i>
      <span>${ch.text}</span>
    </button>`).join('');

  const invItems = state.inventory.length
    ? state.inventory.map(it=>`<span class="inv-item">${it}</span>`).join('')
    : '<span style="font-size:12px;color:var(--color-text-secondary);">Inventario vacío</span>';

  const logItems = state.log.slice(-6).reverse().map(l=>`<div class="log-entry">${l}</div>`).join('');

  return `
  ${statsBar}
  <div class="scene-card">
    <div class="scene-location"><i class="ti ${scene.icon}" aria-hidden="true"></i>${scene.location}</div>
    <div class="scene-img-row">${tags}</div>
    <div class="scene-text">${scene.text}</div>
    <div class="choices-title">¿Qué haces, pana?</div>
    <div class="choices">${choices}</div>
  </div>
  <div class="inventory">
    <div class="inv-title"><i class="ti ti-backpack" aria-hidden="true"></i> Inventario</div>
    <div class="inv-grid">${invItems}</div>
  </div>
  ${state.log.length ? `<div class="log">${logItems}</div>` : ''}`;
}

function bindEvents(){
  document.querySelectorAll('[data-action="start-charselect"]').forEach(b=>{
    b.addEventListener('click',()=>{ state.phase='charselect'; render(); });
  });
  document.querySelectorAll('[data-action="select-char"]').forEach(b=>{
    b.addEventListener('click',()=>{
      const cid = b.dataset.char;
      const ch = CHARS.find(c=>c.id===cid);
      state.char = ch;
      state.stats = { hambre:70, plata:50, bondad:5, ...ch.stats };
      state.inventory = [...ch.items];
      state.phase='game';
      state.log.push(`Empezaste como ${ch.name} — ¡Que chévere!`);
      render();
    });
  });
  document.querySelectorAll('[data-action="choice"]').forEach(b=>{
    b.addEventListener('click',()=>{
      const scene = getScene(state.currentScene);
      const idx = parseInt(b.dataset.idx);
      const choice = scene.choices[idx];
      if(!choice) return;
      applyEffect(choice.effect||{});
      state.log.push(`[${scene.location}] → ${choice.text.substring(0,50)}...`);
      if(choice.next === '__restart__'){
        state = { phase:'intro', char:null, currentScene:'mercado_chacao', stats:{hambre:60,plata:50,bondad:5,fuerza:5,astucia:5,labia:5,resistencia:5}, inventory:[], log:[] };
      } else {
        state.currentScene = choice.next;
        if(state.stats.hambre < 20) { state.log.push('¡Tienes hambre! Busca algo de comer.'); }
        if(state.stats.plata < 5) { state.log.push('¡Se te está acabando la plata, pana!'); }
      }
      render();
    });
  });
}

render();
</script>
</body>
</html>
