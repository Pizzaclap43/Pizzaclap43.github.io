
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent;color:var(--color-text-primary)}
#app{max-width:680px;margin:0 auto;padding:1rem 0}

.vz-header{background:#CF142B;border-radius:var(--border-radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px}
.vz-flag{display:flex;flex-direction:column;width:32px;flex-shrink:0}
.vz-flag span{height:10px;width:100%;border-radius:2px}
.vz-flag span:nth-child(1){background:#CF142B}
.vz-flag span:nth-child(2){background:#003DA5}
.vz-flag span:nth-child(3){background:#F5D800}
.vz-htitle{color:#fff;font-size:16px;font-weight:500}
.vz-hsub{color:rgba(255,255,255,0.8);font-size:12px;margin-top:2px}
.vz-hright{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.vz-stat{background:rgba(0,0,0,0.25);border-radius:var(--border-radius-md);padding:4px 10px;text-align:center}
.vz-stat-l{font-size:10px;color:rgba(255,255,255,0.7)}
.vz-stat-v{font-size:13px;font-weight:500;color:#fff}

.story-area{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem;min-height:200px}
.story-loc{font-size:11px;color:var(--color-text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.05em}
.story-loc i{font-size:13px}
.story-narrator{font-size:13px;color:var(--color-text-secondary);font-style:italic;margin-bottom:10px;padding:8px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border-left:2px solid #CF142B;border-radius:0}

.story-text{font-size:14px;line-height:1.8;color:var(--color-text-primary);margin-bottom:1rem}
.story-text p{margin-bottom:10px}
.story-text p:last-child{margin-bottom:0}

.dialogue-block{margin:12px 0;padding:10px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary)}
.dialogue-speaker{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
.dialogue-text{font-size:14px;line-height:1.6;color:var(--color-text-primary)}
.dialogue-npc{background:var(--color-background-secondary)}
.dialogue-player{background:var(--color-background-info);border-color:var(--color-border-info)}
.dialogue-player .dialogue-speaker{color:var(--color-text-info)}

.tags-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}

.choices-section{margin-top:1rem}
.choices-label{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.choices-grid{display:flex;flex-direction:column;gap:8px}
.choice-btn{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 14px;text-align:left;cursor:pointer;font-size:13px;color:var(--color-text-primary);display:flex;align-items:flex-start;gap:10px;font-family:var(--font-sans);transition:background 0.12s}
.choice-btn:hover{background:var(--color-background-secondary)}
.choice-btn:active{transform:scale(0.99)}
.choice-btn.danger{border-color:var(--color-border-danger);color:var(--color-text-danger)}
.choice-btn.success{border-color:var(--color-border-success);color:var(--color-text-success)}
.choice-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.choice-body{}
.choice-title{font-weight:500;margin-bottom:2px}
.choice-hint{font-size:11px;color:var(--color-text-secondary)}

.inv-bar{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:1rem}
.inv-title{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.inv-items{display:flex;flex-wrap:wrap;gap:6px}
.inv-item{font-size:12px;padding:3px 10px;border-radius:10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}

.log-panel{border-top:0.5px solid var(--color-border-tertiary);padding-top:10px;margin-top:6px}
.log-title{font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
.log-entry{font-size:12px;color:var(--color-text-secondary);padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.log-entry:last-child{border-bottom:none}
.log-good{color:var(--color-text-success)}
.log-bad{color:var(--color-text-danger)}

.char-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:1rem}
.char-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1rem;cursor:pointer;transition:border-color 0.12s,background 0.12s}
.char-card:hover{background:var(--color-background-secondary);border-color:var(--color-border-primary)}
.char-ava{font-size:32px;margin-bottom:8px}
.char-name{font-size:14px;font-weight:500;margin-bottom:4px}
.char-region{font-size:11px;color:#CF142B;margin-bottom:6px;font-weight:500}
.char-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:8px}
.char-attrs{display:flex;flex-wrap:wrap;gap:4px}
.char-attr{font-size:11px;padding:2px 7px;border-radius:8px;background:var(--color-background-secondary);color:var(--color-text-secondary)}

.intro-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem;text-align:center}
.intro-emblem{font-size:48px;margin-bottom:12px}
.intro-title{font-size:20px;font-weight:500;margin-bottom:6px}
.intro-sub{font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:1.25rem}
.intro-features{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:1.25rem}
.feature-tag{font-size:11px;padding:3px 10px;border-radius:10px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.btn-start{background:#CF142B;color:#fff;border:none;border-radius:var(--border-radius-md);padding:10px 24px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-sans)}
.btn-start:hover{background:#a5102a}

.result-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem;text-align:center;margin-top:1rem}
.result-icon{font-size:40px;margin-bottom:10px}
.result-title{font-size:18px;font-weight:500;margin-bottom:8px}
.result-text{font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:1rem}
.result-stats{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:1rem}
.result-stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 14px;text-align:center}
.result-stat-l{font-size:10px;color:var(--color-text-secondary)}
.result-stat-v{font-size:16px;font-weight:500}

.typewriter-cursor{display:inline-block;width:2px;height:14px;background:var(--color-text-primary);vertical-align:-2px;animation:blink 0.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.progress-bar{height:3px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1rem;overflow:hidden}
.progress-fill{height:100%;background:#CF142B;border-radius:2px;transition:width 0.4s}

.notification{background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-md);padding:8px 12px;font-size:12px;color:var(--color-text-warning);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.notification i{font-size:14px}
</style>

<div id="app"></div>

<script>
const CHARS=[
  {id:'llanero',ava:'🤠',name:'Pedro El Llanero',region:'Llanos de Apure',
   desc:'Jinete y coleador de toda la vida. Conoce el llano como la palma de su mano. Toca el cuatro de maravilla y no le teme a nada.',
   attrs:['Fuerza 9','Resistencia 9','Labia 5','Astucia 5'],
   stats:{fuerza:9,resistencia:9,labia:5,astucia:5,honor:10,hambre:80,plata:40},
   items:['Sombrero pelo e\' guama','Machete llanero','Cuatro','Cogollo de palma'],
   startBonus:'Maestro del llano: los caballos te obedecen y los llaneros te respetan.'},
  {id:'maracucha',ava:'👩',name:'Marlys La Maracucha',region:'Maracaibo, Zulia',
   desc:'Del mismísimo mercado Las Pulgas. Habla a mil por hora, regatéa sin piedad y conoce a medio Zulia. Tiene respuestas para todo.',
   attrs:['Labia 10','Astucia 8','Fuerza 5','Resistencia 6'],
   stats:{fuerza:5,resistencia:6,labia:10,astucia:8,honor:10,hambre:80,plata:60},
   items:['Chinelas de goma','Patilla cortada','Rosquete de coco','Fan de arepa'],
   startBonus:'Reina del regateo: consigues mejores precios y más información.'},
  {id:'caraqueña',ava:'👩‍💼',name:'Valentina La Caraqueña',region:'La Candelaria, Caracas',
   desc:'Criada en Caracas entre colas, metro y cachifos. Universitaria de la UCV. Sabe moverse en la ciudad como nadie y entiende la política mejor que cualquiera.',
   attrs:['Astucia 10','Labia 8','Fuerza 4','Resistencia 6'],
   stats:{fuerza:4,resistencia:6,labia:8,astucia:10,honor:10,hambre:80,plata:70},
   items:['Tarjeta del metro','Arepa pelada','Thermos de café','Cuaderno UCV'],
   startBonus:'Pilla caraqueña: detectas mentiras y encuentras atajos en la ciudad.'},
  {id:'margariteño',ava:'🎣',name:'Eusebio El Margariteño',region:'Porlamar, Isla de Margarita',
   desc:'Pescador de toda la vida, cocinero sin título y campeón de dominó. Sabe de vientos, corrientes y de cómo hacer que cualquier extraño se sienta en casa.',
   attrs:['Astucia 8','Resistencia 8','Labia 7','Fuerza 7'],
   stats:{fuerza:7,resistencia:8,labia:7,astucia:8,honor:10,hambre:80,plata:55},
   items:['Red de pesca','Queso de mano','Ron Santa Teresa','Dominó de hueso'],
   startBonus:'Hijo del mar: acceso a rutas costeras y la comunidad pescadora.'}
];

const SCENES={
  intro_mercado:{
    loc:'Mercado de Chacao, Caracas — 7:30 AM',
    locIcon:'ti-building-store',
    tags:['Caracas','Gastronomía','Inicio de aventura'],
    narrator:'El sol caraqueño ya calienta. Huele a café, caraotas y aceite caliente.',
    story:[
      {type:'p',text:'El Mercado de Chacao bulle de vida desde temprano. Vendedores arman sus puestos, señoras regatean precios de tomate, y en el fondo suena una gaita zuliana desde un radio viejo. Tú llegas cargando tu mochila, recién bajado del autobus que viene de tu tierra.'},
      {type:'npc',speaker:'Doña Carmen (puestera de arepas)',text:'"¡Ey, mi amor! ¿Qué es lo que va a llevar? Tengo arepa pelada, de queso, de dominó, de chicharrón... ¡La que usted quiera! Y el café está recién colado, papito."'},
      {type:'p',text:'Mientras consideras, un muchacho de unos dieciseis años se acerca corriendo. Trae una camiseta del Caracas F.C. rota en el hombro y cara de traer malas noticias.'},
      {type:'npc',speaker:'Jesús (muchacho del mercado)',text:'"¡Espere, espere! ¿Usted es forastero, verdad? Mire, estoy buscando a alguien que conozca bien el país... Mi abuelo está en problemas y necesito ayuda urgente. Nadie aquí me quiere escuchar."'},
      {type:'p',text:'Doña Carmen te mira y encoge los hombros: "Ese muchacho lleva toda la mañana corriendo de un lado al otro. Parece de verdad asustado."'}
    ],
    choices:[
      {text:'Escuchar al muchacho Jesús',hint:'Quizás sea el inicio de algo grande.',icon:'ti-ear',style:'success',next:'escuchar_jesus',effects:{honor:+1}},
      {text:'Desayunar primero con Doña Carmen',hint:'Un arepa de queso y café. El alma necesita fuerzas.',icon:'ti-coffee',next:'desayuno_carmen',effects:{hambre:+20,plata:-8}},
      {text:'Explorar el mercado antes de comprometerte',hint:'Ver qué más hay por aquí.',icon:'ti-eye',next:'explorar_mercado',effects:{astucia:+1}}
    ]
  },

  escuchar_jesus:{
    loc:'Rincón del Mercado de Chacao',
    locIcon:'ti-message-circle',
    tags:['Misterio','Familia','Caracas'],
    narrator:'El muchacho te jala hacia un lado donde hay menos gente.',
    story:[
      {type:'npc',speaker:'Jesús',text:'"Gracias por escucharme, mire... Mi abuelo, Don Eliecer, es un viejito de 78 años que vive solo en el pueblo de Chuao, en Aragua. Hace tres días me llamó diciendo que unos señores querían quitarle su terreno de cacao. ¡El cacao de mi abuelo es el más famoso de Venezuela! Luego se cortó la llamada y desde entonces no he podido comunicarme con él."'},
      {type:'p',text:'Sacas la conclusión rápido: Chuao es un pueblo solo accesible por mar, enclavado entre montañas en la costa de Aragua. El cacao de Chuao es considerado el mejor del mundo. Si hay gente queriendo ese terreno, hay dinero serio de por medio.'},
      {type:'npc',speaker:'Jesús',text:'"Yo soy de aquí de Caracas, nunca he ido a Chuao. No conozco el camino, no tengo plata para el pasaje. Pero si usted me ayuda a llegar allá y a ver qué le pasó a mi abuelo... le juro que le pago cuando pueda. Mi abuelo tiene cacao, y el cacao de Chuao vale oro."'},
      {type:'p',text:'El muchacho tiene los ojos aguados pero intenta no llorar. Doña Carmen, que escuchó todo desde su puesto, se acerca con dos cafés y susurra: "Yo conozco a Don Eliecer. Es buena gente. Si van a Chuao, pasen por La Matica en Puerto Colombia — pregunten por el Capitán Raimundo, él los puede llevar en lancha."'}
    ],
    choices:[
      {text:'Aceptar ayudar a Jesús — vamos a Chuao',hint:'El viaje empieza. Puerto Colombia, luego Chuao.',icon:'ti-ship',style:'success',next:'viaje_puerto_colombia',effects:{honor:+2,plata:-15,inventario:['Nota de Doña Carmen para Raimundo']}},
      {text:'Pedir más información antes de decidir',hint:'¿Qué tan peligroso puede ser esto realmente?',icon:'ti-info-circle',next:'mas_info_jesus',effects:{astucia:+1}},
      {text:'No puedes comprometerte — demasiado peligroso',hint:'Quizás alguien más pueda ayudarlo.',icon:'ti-x',style:'danger',next:'rechazar_jesus',effects:{honor:-2}}
    ]
  },

  mas_info_jesus:{
    loc:'Mercado de Chacao — Mesa del café',
    locIcon:'ti-coffee',
    tags:['Información','Estrategia'],
    narrator:'Se sientan en un taburete desvencijado. Doña Carmen sirve más café sin que nadie lo pida.',
    story:[
      {type:'p',text:'Mientras Jesús te cuenta todo con detalle, armas el mapa mental de la situación.'},
      {type:'npc',speaker:'Jesús',text:'"Los señores que lo visitaron andaban en un carro negro con placa de Caracas. Mi abuelo dice que le ofrecieron una plata ridícula por el terreno. Cuando él se negó, uno le dijo: \'Viejo, piénselo bien. Aquí no hay luz, no hay señal, no hay nadie que lo ayude.\'"'},
      {type:'p',text:'Doña Carmen, que no puede evitar opinar, interviene:'},
      {type:'npc',speaker:'Doña Carmen',text:'"Eso es lo que está pasando en varios pueblos de la costa. Gente con plata quiere comprar tierras para hacer hoteles exclusivos. El cacao de Chuao hasta lo exportan a Europa, imagínese. Eso vale millones."'},
      {type:'npc',speaker:'Jesús',text:'"Si algo le pasa a mi abuelo... él es lo único que me queda. Mi mamá emigró a Chile hace dos años. Mi papá nunca apareció. Don Eliecer me crió a mí también los veranos, ¿sabe? Me enseñó a pelar cacao, a tostar, a todo."'},
      {type:'p',text:'Ya tienes suficiente información. La decisión es tuya.'}
    ],
    choices:[
      {text:'Decidido: ayudo a Jesús. Vamos a Puerto Colombia.',hint:'El riesgo vale la pena.',icon:'ti-ship',style:'success',next:'viaje_puerto_colombia',effects:{honor:+2,plata:-15,inventario:['Nota de Doña Carmen para Raimundo']}},
      {text:'Ayudar pero buscar aliados primero en Caracas',hint:'Un aliado puede marcar la diferencia.',icon:'ti-users',next:'buscar_aliados_caracas',effects:{astucia:+1,plata:-10}}
    ]
  },

  buscar_aliados_caracas:{
    loc:'La Candelaria, Caracas',
    locIcon:'ti-building',
    tags:['Caracas','Aliados','Historia'],
    narrator:'La Candelaria huele a café italiano y sonido de dominó. Los ancianos juegan en la plaza bajo el sol.',
    story:[
      {type:'p',text:'Llevas a Jesús a La Candelaria, el barrio donde los italianos se instalaron en Venezuela hace décadas. Aquí vive Don Bruno Ferretti, abogado retirado de 75 años, venezolano-italiano que conoce las leyes de tierra mejor que nadie.'},
      {type:'npc',speaker:'Don Bruno Ferretti',text:'"¡Ay, caramba! El cacao de Chuao tiene Denominación de Origen Controlada desde 2000. Eso significa que el terreno tiene protección especial. Si alguien está presionando al anciano, eso es delito. Aquí tengo los documentos..."'},
      {type:'p',text:'Don Bruno abre un archivador viejo y saca papeles amarillentos. Te entrega una copia del decreto de protección del cacao de Chuao.'},
      {type:'npc',speaker:'Don Bruno',text:'"Lleva esto. Si esos señores vuelven, muéstraselo. Y si ya actuaron, es evidencia. Vayan con cuidado, muchachos."'},
      {type:'npc',speaker:'Jesús',text:'"¿Y usted, Don Bruno? ¿Puede venir?'},
      {type:'npc',speaker:'Don Bruno',text:'"Mi muchacho, tengo 75 años y rodilla mala. Pero les doy mi número. Si necesitan un abogado por teléfono, aquí estoy."'}
    ],
    choices:[
      {text:'Partir a Puerto Colombia con los documentos legales',hint:'Ahora tienes argumentos de peso.',icon:'ti-ship',style:'success',next:'viaje_puerto_colombia',effects:{honor:+1,inventario:['Decreto DOC Cacao Chuao','Número de Don Bruno']}},
    ]
  },

  viaje_puerto_colombia:{
    loc:'Puerto Colombia, Aragua — Mediodía',
    locIcon:'ti-anchor',
    tags:['Viaje','Costa','Aragua'],
    narrator:'El por puesto los sacude todo el camino desde Caracas. Jesús duerme dos horas, exhauasto.',
    story:[
      {type:'p',text:'Puerto Colombia es un pueblito de pescadores en la costa de Aragua. Las casas son de colores, las redes cuelgan de las fachadas, y el mar Caribe brilla azul imposible bajo el sol del mediodía. Huele a salitre y pescado frito.'},
      {type:'p',text:'Encuentran el restaurante La Matica sin problema — es el único que tiene una tele encendida mostrando béisbol venezolano. El Capitán Raimundo, un hombre de sesenta años con piel curtida y brazos como troncos, lee la nota de Doña Carmen y frunce el ceño.'},
      {type:'npc',speaker:'Capitán Raimundo',text:'"Don Eliecer... Ese viejo es buena gente. Lo conozco desde hace treinta años. ¿Dicen que unos tipos lo están presionando?"'},
      {type:'p',text:'Asiente despacio, mirando el mar.'},
      {type:'npc',speaker:'Capitán Raimundo',text:'"Miren, yo los llevo en la lancha. Son cuarenta y cinco minutos por mar. Pero les digo una cosa: si esos señores están metidos en algo turbio, tengan cuidado. Chuao es un pueblo chiquito. Todo el mundo se conoce y todo el mundo habla."'},
      {type:'p',text:'Mientras esperan que el capitán aliste la lancha, la hija de Raimundo — Marisol, de unos catorce años — les trae dos caballitos de Frescolita bien fría y una bandeja de tostones con queso blanco.'},
      {type:'npc',speaker:'Marisol',text:'"Coman algo antes de irse. El mar hoy está un poco picao\'."'}
    ],
    choices:[
      {text:'Comer y zarpar hacia Chuao',hint:'El tiempo apremia. El viejo puede estar en peligro.',icon:'ti-sailboat',style:'success',next:'llegada_chuao',effects:{hambre:+15}},
      {text:'Preguntarle al capitán más sobre los extraños',hint:'Quizás él sabe más de lo que dice.',icon:'ti-info-circle',next:'info_capitán',effects:{astucia:+1}},
      {text:'Enviar mensaje a Don Bruno antes de zarpar',hint:'Mantenerlo informado puede ayudar.',icon:'ti-phone',next:'llegada_chuao',effects:{honor:+1}}
    ]
  },

  info_capitán:{
    loc:'Muelle de Puerto Colombia',
    locIcon:'ti-anchor',
    tags:['Información','Aliados'],
    narrator:'Raimundo amarra un cabo y habla sin mirarte, como si la información le costara.',
    story:[
      {type:'npc',speaker:'Capitán Raimundo',text:'"Hace como diez días pasaron por aquí dos tipos. Preguntaron por el camino a Chuao, por el cacao, por los dueños de los terrenos. Se hospedaron en la posada del Chino. Pagaron en efectivo, mucha plata. Llevaban maletines."'},
      {type:'npc',speaker:'Capitán Raimundo',text:'"Uno de ellos le preguntó a mi cuñado si el terreno de cacao \'tenía herederos que vivieran en Caracas\'. Eso me pareció raro. Como si supieran que el viejo está solo."'},
      {type:'p',text:'Jesús aprieta la mandíbula al escuchar eso.'},
      {type:'npc',speaker:'Jesús',text:'"¿Cómo eran físicamente?"'},
      {type:'npc',speaker:'Capitán Raimundo',text:'"Uno era alto, con lentes. El otro usaba camisa manga larga en plena costa, en este calor. Eso solo lo hace alguien que no es de aquí o que tiene algo que esconder."'}
    ],
    choices:[
      {text:'Zarpar de inmediato a Chuao con esta información',hint:'Ahora sabemos a qué nos enfrentamos.',icon:'ti-sailboat',style:'success',next:'llegada_chuao',effects:{astucia:+1,inventario:['Descripción de los dos extraños']}}
    ]
  },

  llegada_chuao:{
    loc:'Chuao, Costa de Aragua — Tarde',
    locIcon:'ti-plant',
    tags:['Chuao','Cacao','Pueblo','Aragua'],

let G={
  phase:'intro',
  char:null,
  scene:'intro_mercado',
  stats:{fuerza:5,resistencia:5,labia:5,astucia:5,honor:10,hambre:80,plata:50},
  inventory:[],
  log:[],
  turn:0
};

function applyEffects(e){
  const s=G.stats;
  ['fuerza','resistencia','labia','astucia','honor','hambre','plata'].forEach(k=>{
    if(e[k]!==undefined) s[k]=Math.max(0,Math.min(k==='honor'?20:k==='hambre'?100:999,s[k]+(e[k]||0)));
  });
  if(e.inventario) e.inventario.forEach(i=>{ if(!G.inventory.includes(i)) G.inventory.push(i); });
}

function addLog(msg,type=''){
  G.log.unshift({msg,type});
  if(G.log.length>8) G.log.pop();
}

function getStatBar(val,max,color){
  const pct=Math.round((val/max)*100);
  return `<div style="height:3px;background:var(--color-border-tertiary);border-radius:2px;margin-top:3px"><div style="height:100%;width:${pct}%;background:${color};border-radius:2px"></div></div>`;
}

function renderHeader(){
  const c=G.char;
  const s=G.stats;
  if(!c) return '';
  return `<div class="vz-header">
    <div class="vz-flag"><span></span><span></span><span></span></div>
    <div>
      <div class="vz-htitle">${c.ava} ${c.name}</div>
      <div class="vz-hsub">${c.region}</div>
    </div>
    <div class="vz-hright">
      <div class="vz-stat">
        <div class="vz-stat-l">Hambre</div>
        <div class="vz-stat-v">${Math.round(s.hambre)}%</div>
        ${getStatBar(s.hambre,100,'#1D9E75')}
      </div>
      <div class="vz-stat">
        <div class="vz-stat-l">Plata</div>
        <div class="vz-stat-v">Bs.${Math.round(s.plata)}</div>
      </div>
      <div class="vz-stat">
        <div class="vz-stat-l">Honor</div>
        <div class="vz-stat-v">${Math.round(s.honor)}/20</div>
        ${getStatBar(s.honor,20,'#CF142B')}
      </div>
    </div>
  </div>`;
}

    <div class="intro-emblem">🇻🇪</div>
    <div class="intro-title">Venezuela: La Gran Aventura</div>

    <div class="intro-features">
      <span class="feature-tag"><i class="ti ti-plant" aria-hidden="true"></i> Cacao de Chuao</span>

      <span class="feature-tag"><i class="ti ti-mountain" aria-hidden="true"></i> Salto Ángel</span>

      <span class="feature-tag"><i class="ti ti-anchor" aria-hidden="true"></i> Costa caribe</span>
    </div>
    <button class="btn-start" data-a="go-charselect">Comenzar la aventura →</button>

}

function renderCharSelect(){
  const cards=CHARS.map(c=>`
    <div class="char-card" data-a="pick-char" data-id="${c.id}">
      <div class="char-ava">${c.ava}</div>
      <div class="char-name">${c.name}</div>
      <div class="char-region">${c.region}</div>
      <div class="char-desc">${c.desc}</div>
      <div style="font-size:11px;color:var(--color-text-success);margin-bottom:8px;padding:4px 8px;background:var(--color-background-success);border-radius:4px">${c.startBonus}</div>
      <div class="char-attrs">${c.attrs.map(a=>`<span class="char-attr">${a}</span>`).join('')}</div>
    </div>`).join('');
  return `<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem">
    <div style="font-size:15px;font-weight:500;margin-bottom:4px">Elige tu personaje</div>
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem">Cada uno ve Venezuela con ojos distintos.</div>
    <div class="char-grid">${cards}</div>
  </div>`;
}

function renderScene(){
  const sc=SCENES[G.scene];
  if(!sc) return '<div>Escena no encontrada.</div>';

  const notifs=[];
  if(G.stats.hambre<30) notifs.push(`<div class="notification"><i class="ti ti-alert-triangle" aria-hidden="true"></i>Tienes mucha hambre. Busca algo de comer.</div>`);
  if(G.stats.plata<10) notifs.push(`<div class="notification"><i class="ti ti-coin-off" aria-hidden="true"></i>Casi sin plata. Cuidado con los gastos.</div>`);

  const storyBlocks=sc.story.map(b=>{
    if(b.type==='p') return `<p>${b.text}</p>`;
    if(b.type==='npc') return `<div class="dialogue-block dialogue-npc"><div class="dialogue-speaker"><i class="ti ti-user" aria-hidden="true"></i> ${b.speaker}</div><div class="dialogue-text">"${b.text}"</div></div>`;
    if(b.type==='player') return `<div class="dialogue-block dialogue-player"><div class="dialogue-speaker"><i class="ti ti-user-circle" aria-hidden="true"></i> Tú</div><div class="dialogue-text">"${b.text}"</div></div>`;
    return '';
  }).join('');

  const choicesHTML=sc.choices.map((ch,i)=>`
    <button class="choice-btn${ch.style?' '+ch.style:''}" data-a="choice" data-i="${i}">
      <i class="ti ${ch.icon} choice-icon" aria-hidden="true"></i>
      <div class="choice-body">
        <div class="choice-title">${ch.text}</div>
        ${ch.hint?`<div class="choice-hint">${ch.hint}</div>`:''}
      </div>
    </button>`).join('');

  const invHTML=G.inventory.length
    ? G.inventory.map(it=>`<span class="inv-item">${it}</span>`).join('')
    : `<span style="font-size:12px;color:var(--color-text-secondary)">Vacío</span>`;

  const logHTML=G.log.slice(0,5).map(l=>`<div class="log-entry${l.type?' log-'+l.type:''}">${l.msg}</div>`).join('');

  const pct=Math.round((G.turn/12)*100);

  return `
    ${notifs.join('')}
    <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,pct)}%"></div></div>
    <div class="story-area">
      <div class="story-loc"><i class="ti ${sc.locIcon}" aria-hidden="true"></i>${sc.loc}</div>
      <div class="tags-row">${sc.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      ${sc.narrator?`<div class="story-narrator">${sc.narrator}</div>`:''}
      <div class="story-text">${storyBlocks}</div>
      <div class="choices-section">
        <div class="choices-label">¿Qué haces?</div>
        <div class="choices-grid">${choicesHTML}</div>
      </div>
    </div>
    <div class="inv-bar">
      <div class="inv-title"><i class="ti ti-backpack" aria-hidden="true"></i>Inventario</div>
      <div class="inv-items">${invHTML}</div>
    </div>
    ${G.log.length?`<div class="log-panel"><div class="log-title"><i class="ti ti-history" aria-hidden="true"></i>Historial</div>${logHTML}</div>`:''}
  `;
}

function render(){
  const app=document.getElementById('app');
  let html='';
  if(G.phase==='intro') html=renderIntro();
  else if(G.phase==='charselect') html=`${renderHeader()}${renderCharSelect()}`;
  else html=`${renderHeader()}${renderScene()}`;
  app.innerHTML=html;
  bindEvents();
}

function bindEvents(){
  document.querySelectorAll('[data-a="go-charselect"]').forEach(b=>b.addEventListener('click',()=>{G.phase='charselect';render();}));
  document.querySelectorAll('[data-a="pick-char"]').forEach(b=>b.addEventListener('click',()=>{
    const ch=CHARS.find(c=>c.id===b.dataset.id);
    G.char=ch;
    G.stats={...ch.stats};
    G.inventory=[...ch.items];
    G.phase='game';
    G.scene='intro_mercado';
    G.turn=0;
    addLog(`Iniciaste como ${ch.name} — ¡Que viva Venezuela!`,'good');
    render();
  }));
  document.querySelectorAll('[data-a="choice"]').forEach(btn=>btn.addEventListener('click',()=>{
    const sc=SCENES[G.scene];
    const ch=sc.choices[parseInt(btn.dataset.i)];
    if(!ch) return;
    applyEffects(ch.effects||{});
    G.stats.hambre=Math.max(0,G.stats.hambre-5);
    G.turn++;
    addLog(`[${sc.loc.split('—')[0].trim()}] ${ch.text}`);
    if(ch.next==='__restart__'){
      G={phase:'intro',char:null,scene:'intro_mercado',stats:{fuerza:5,resistencia:5,labia:5,astucia:5,honor:10,hambre:80,plata:50},inventory:[],log:[],turn:0};
    } else if(ch.next==='__continue__'){
      sendPrompt('Quiero continuar explorando Venezuela en el RPG. Llevame a una nueva aventura diferente a la de Chuao.');
    } else {
      G.scene=ch.next;
    }
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  }));
}

render();
</script>
